<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Check Channel - Comparar Planos</title>

<style>

/* ====== DARK THEME ====== */
:root {
  --bg: #0b0b0c;
  --bg-soft: #111214;
  --bg-card: #1c1c1f;
  --border: #2a2a2e;
  --text: #f5f5f7;
  --text-soft: #a1a1aa;
}

/* HEADER */
.top-bar {
  height: 44px;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 999;
  background: rgba(15,15,15,0.6);
  backdrop-filter: blur(30px);
  transition: opacity 0.3s ease;
}

.top-bar-inner {
  width: 1076px;
  height: 100%;
  margin: auto;
  display: flex;
  align-items: center;
}

.logo {
  height: 18px;
}

/* BODY */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: var(--bg);
  color: var(--text);
}

/* CONTAINER */
.container {
  width: 1076px;
  margin: auto;
  text-align: center;
}

h1 {
  margin: 47px 0;
  font-size: 52px;
}

.linha {
  border-bottom: 1px solid var(--border);
}

h2 {
  margin-top: 47px;
}

/* STICKY */
.sticky-bloco {
  position: sticky;
  top: 20px;
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(10px);
  z-index: 10;
  padding-bottom: 35px;
}

/* BANDEIRAS */
.bandeira {
  display: inline-block;
  width: 72px;
  height: 48px;
  margin: 6px;
  border-radius: 12px;
  overflow: hidden;
}

.bandeira.active {
  border: 2px solid #555;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 17px;
  margin-top: 24px;
}

/* SELECT */
select {
  height: 70px;
  border-radius: 16px;
  border: none;
  background: var(--bg-card);
  color: var(--text);
  font-size: 18px;
  padding: 0 20px;
}

select:invalid {
  color: var(--text-soft);
}

/* RESULTADOS */
.resultados {
  display: grid;
  grid-template-columns: repeat(3,1fr);
}

.coluna {
  border-top: 1px solid var(--border);
}

.canal-bloco {
  height: 110px;
  border-bottom: 1px solid var(--border);
}

/* TAGS */
.canal-badge {
  background: #222;
  color: var(--text-soft);
  border-radius: 8px;
  padding: 2px 8px;
}

/* PLACEHOLDER */
.canal-off div {
  background: #2a2a2e;
}

/* ===== COMPACTO ===== */
.sticky-bloco.compacto h2 {
  font-size: 18px;
  font-weight: 700;
}

.sticky-bloco.compacto .bandeira {
  width: 58px;
  height: 38px;
  margin: 4px;
}

</style>
</head>

<body>

<div class="container">

<h1>Compare los planes de programación</h1>
<div class="linha"></div>

<div class="sticky-bloco">

<h2>Selecciona el país</h2>
<div id="bandeiras"></div>

<div class="grid">

<div>
<h3>Paquete 1</h3>
<select id="cliente1"></select>
<select id="pacote1"></select>
</div>

<div>
<h3>Paquete 2</h3>
<select id="cliente2"></select>
<select id="pacote2"></select>
</div>

<div>
<h3>Paquete 3</h3>
<select id="cliente3"></select>
<select id="pacote3"></select>
</div>

</div>
</div>

<div class="resultados">
<div class="coluna" id="coluna1"></div>
<div class="coluna" id="coluna2"></div>
<div class="coluna" id="coluna3"></div>
</div>

</div>

<script>

let dados = [];
let paisSelecionado = "";

fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {
  const linhas = texto.split('\n');

  linhas.forEach(l => {
    const c = l.split(';');
    if(c[0]) dados.push({
      pais:c[0], cliente:c[1], pacote:c[2]
    });
  });

  carregarBandeiras();
});

/* LISTENERS */
['cliente1','cliente2','cliente3'].forEach((id,i)=>{
  document.getElementById(id).onchange = function(){
    let pacotes = dados.filter(d => d.pais==paisSelecionado && d.cliente==this.value);

    let select = document.getElementById(`pacote${i+1}`);
    select.innerHTML = '<option selected>Selecciona el paquete</option>';

    pacotes.forEach(p=>{
      select.innerHTML += `<option>${p.pacote}</option>`;
    });
  };
});

['pacote1','pacote2','pacote3'].forEach(id=>{
  document.getElementById(id).onchange = ()=>comparar();
});

function carregarBandeiras(){
  let container = document.getElementById('bandeiras');

  [...new Set(dados.map(d=>d.pais))].forEach(p=>{
    let div = document.createElement('div');
    div.className='bandeira';
    div.innerText = p;
    div.onclick = ()=>selecionarPais(p,div);
    container.appendChild(div);
  });
}

function selecionarPais(pais,el){
  paisSelecionado = pais;

  document.querySelectorAll('.bandeira').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  let clientes = [...new Set(dados.filter(d=>d.pais==pais).map(d=>d.cliente))];

  ['cliente1','cliente2','cliente3'].forEach(id=>{
    let s = document.getElementById(id);
    s.innerHTML='<option>Selecciona cliente</option>';
    clientes.forEach(c=>s.innerHTML+=`<option>${c}</option>`);
  });

  ['pacote1','pacote2','pacote3'].forEach(id=>{
    document.getElementById(id).innerHTML='<option>Selecciona paquete</option>';
  });

  ['coluna1','coluna2','coluna3'].forEach(id=>{
    document.getElementById(id).innerHTML='';
  });
}

function comparar(){
  console.log('comparando...');
}

/* SCROLL FIX */
window.addEventListener('scroll',()=>{
  const bloco = document.querySelector('.sticky-bloco');

  const trigger = 300;

  if(window.scrollY >= trigger){
    bloco.classList.add('compacto');
  } else {
    bloco.classList.remove('compacto');
  }
});

</script>

</body>
</html>
