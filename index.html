<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comparar Planos</title>

<style>

/* ===== GERAL ===== */
body {
  margin: 0;
  font-family: Arial;
  background-color: #f2f2f2;
  text-align: center;
}

/* ===== TÍTULO ===== */
h1 {
  margin-top: 40px;
  font-size: 42px;
  color: #333;
}

/* ===== LINHA DIVISÓRIA ===== */
.linha {
  width: 60%;
  margin: 20px auto;
  border-bottom: 1px solid #ccc;
}

/* ===== SUBTÍTULO ===== */
h2 {
  color: #444;
  font-weight: normal;
}

/* ===== BANDEIRAS ===== */
.bandeiras {
  margin: 20px 0;
}

.bandeira {
  display: inline-block;
  width: 70px;
  height: 45px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  background-size: cover;
  border: 2px solid transparent;
}

.bandeira:hover {
  border: 2px solid blue;
}

/* ===== GRID PLANOS ===== */
.container-planos {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 30px;
}

/* ===== CARD ===== */
.card {
  background: #eaeaea;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
}

/* ===== INPUTS ===== */
select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* ===== BOTÃO ===== */
button {
  margin-top: 25px;
  padding: 12px 30px;
  background: orange;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  border-radius: 6px;
}

/* ===== TABELA ===== */
table {
  margin: 40px auto;
  border-collapse: collapse;
  width: 90%;
  background: white;
}

th, td {
  padding: 8px;
  border: 1px solid #ccc;
}

.si { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }

</style>
</head>

<body>

<h1>Compare los planes de programación</h1>
<div class="linha"></div>

<h2>Selecciona el país</h2>

<!-- PAIS -->
<select id="pais"></select>

<h2>Selecciona el cliente</h2>
<select id="cliente"></select>

<!-- PLANOS -->
<div class="container-planos">

  <div class="card">
    <h3>Paquete 1</h3>
    <select id="pacote1"></select>
  </div>

  <div class="card">
    <h3>Paquete 2</h3>
    <select id="pacote2"></select>
  </div>

  <div class="card">
    <h3>Paquete 3</h3>
    <select id="pacote3"></select>
  </div>

</div>

<button onclick="comparar()">Comparar</button>

<!-- TABELA -->
<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>

let dados = [];
let todosCanais = [];

// ================= CARREGAR CSV =================
fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.replace(/\r/g,'').split('\n');

  linhas.forEach((linha, i) => {

    if (i === 0) return;

    const col = linha.split(';').map(c => c.trim());

    const pais = col[0];
    const cliente = col[1];
    const pacote = col[2];
    const vc = col[3];
    const canal = col[4]?.toUpperCase();
    const resolucao = col[7];

    if (pais && cliente && pacote && canal) {
      dados.push({ pais, cliente, pacote, canal, vc, resolucao });
      todosCanais.push({ canal, vc, resolucao });
    }
  });

  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c => [c.canal, c]))
  );

  carregarPais();

});

// ================= CARREGAR PAIS =================
function carregarPais() {

  const select = document.getElementById('pais');

  const paises = [...new Set(dados.map(d => d.pais))].sort();

  select.innerHTML = '<option value="">Seleccionar</option>';

  paises.forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });

}

// ================= PAIS CHANGE =================
document.getElementById('pais').addEventListener('change', function() {

  const clientes = [...new Set(
    dados.filter(d => d.pais === this.value).map(d => d.cliente)
  )];

  const select = document.getElementById('cliente');
  select.innerHTML = '<option value="">Seleccionar</option>';

  clientes.forEach(c => {
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });

});

// ================= CLIENTE CHANGE =================
document.getElementById('cliente').addEventListener('change', function() {

  const pais = document.getElementById('pais').value;

  const pacotes = [...new Set(
    dados.filter(d => d.pais === pais && d.cliente === this.value).map(d => d.pacote)
  )];

  ['pacote1','pacote2','pacote3'].forEach(id => {

    const select = document.getElementById(id);
    select.innerHTML = '<option value="">Seleccionar</option>';

    pacotes.forEach(p => {
      select.innerHTML += `<option value="${p}">${p}</option>`;
    });

  });

});

// ================= COMPARAR =================
function comparar() {

  const pais = document.getElementById('pais').value;
  const cliente = document.getElementById('cliente').value;

  const planos = [
    document.getElementById('pacote1').value,
    document.getElementById('pacote2').value,
    document.getElementById('pacote3').value
  ].filter(p => p);

  if (planos.length === 0) {
    alert("Selecione pelo menos um plano");
    return;
  }

  let thead = `<tr>
    <th>Channel</th>
    <th>Canal</th>
    <th>Resolución</th>`;

  planos.forEach(p => thead += `<th>${p}</th>`);

  thead += '</tr>';

  document.getElementById('thead').innerHTML = thead;

  let html = '';

  todosCanais
    .sort((a,b) => Number(a.vc) - Number(b.vc))
    .forEach(c => {

      html += `<tr>
        <td>${c.vc}</td>
        <td>${c.canal}</td>
        <td>${c.resolucao}</td>`;

      planos.forEach(p => {

        const pertence = dados.some(d =>
          d.pais === pais &&
          d.cliente === cliente &&
          d.pacote === p &&
          d.canal === c.canal
        );

        html += `<td class="${pertence ? 'si' : 'no'}">
          ${pertence ? 'SI' : 'NO'}
        </td>`;
      });

      html += '</tr>';
    });

  document.getElementById('tbody').innerHTML = html;
}

</script>

</body>
</html>
