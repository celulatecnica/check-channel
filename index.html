<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Channel</title>

<style>

/* BASE */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0F0F0F;
  color: #f5f5f7;
}

/* ===== HEADER BASE ===== */

.top-bar {
  position: fixed;
  left: 0;
  width: 100%;
  z-index: 999;

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  transition: transform 0.25s ease;
}

.top-bar-inner {
  width: 1000px;
  max-width: calc(100% - 32px);
  margin: auto;

  height: 100%;
  display: flex;
  align-items: center;
}

/* ===== BARRA 1 (LOGO) ===== */

.top-bar-main {
  top: 0;
  height: 80px;
  background: rgba(15,15,15,0.6);
}

/* ===== BARRA 2 (TÍTULO FIXO) ===== */

.top-bar-sub {
  top: 0;
  height: 44px;
  background: rgba(15,15,15,0.9);

  transform: translateY(-100%); /* ✅ começa FORA da tela */
}

/* ===== LOGO ===== */

.logo {
  height: 22px; /* ✅ ajustado (melhor proporção) */
}

/* ===== TÍTULO ===== */

.titulo-pequeno {
  font-size: 18px;
  font-weight: 600;
}

/* ===== BANNER ===== */

#banner {
  width: 100%;
  display: block;
  margin-top: 80px;
}

/* espaço pra rolar */
.fake-content {
  height: 1500px;
  background: #0F0F0F;
}

</style>
</head>

<body>

<!-- ✅ BARRA 1 (SAI) -->
<div class="top-bar top-bar-main" id="topbarMain">
  <div class="top-bar-inner">
    <img src="icon_gpt_branco.png" class="logo">
  </div>
</div>

<!-- ✅ BARRA 2 (ENTRA) -->
<div class="top-bar top-bar-sub" id="topbarSub">
  <div class="top-bar-inner">
    <div class="titulo-pequeno">Check Channel</div>
  </div>
</div>

<!-- ✅ BANNER -->
<img id="banner" src="banner.png">

<div class="fake-content"></div>

<script>

window.addEventListener('scroll', () => {

  const scrollY = window.scrollY;

  const topMain = document.getElementById('topbarMain');
  const topSub = document.getElementById('topbarSub');

  const limite = 120;

  if (scrollY > limite) {
    /* ✅ barra 1 sobe e some */
    topMain.style.transform = 'translateY(-100%)';

    /* ✅ barra 2 desce e aparece */
    topSub.style.transform = 'translateY(0)';
  } else {
    /* volta ao estado inicial */
    topMain.style.transform = 'translateY(0)';
    topSub.style.transform = 'translateY(-100%)';
  }

});

</script>

</body>
</html>
