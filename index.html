<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Check Channel</title>

<style>
body { font-family: Arial; }

.menu {
  background: darkblue;
  padding: 10px;
}

.menu button {
  margin-right: 10px;
  padding: 8px 15px;
  background: #00aaff;
  border: none;
  color: white;
  cursor: pointer;
}

.secao { display: none; padding: 20px; }
.ativa { display: block; }

table {
  margin-top: 20px;
  border-collapse: collapse;
  width: 80%;
}

td, th {
  padding: 6px 10px;
  border: 1px solid black;
  text-align: left;
}

.si { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }
</style>
</head>

<body>

<div class="menu">
  <button onclick="mostrar('validar')">Validar Plano</button>
  <button onclick="mostrar('comparar')">Comparar Planos</button>
</div>

<!-- VALIDAR -->
<div id="validar" class="secao ativa">

<h2>Validar Plano</h2>

País:
<select id="pais"></select>

Cliente:
<select id="cliente"></select>

Plano:
<select id="pacotes"></select>

<table>
<thead>
<tr>
  <th>Channel</th>
  <th>Canal</th>
  <th>Resolução</th>
  <th>Status</th>
</tr>
</thead>
<tbody id="tabela-validar"></tbody>
</table>

</div>

<!-- COMPARAR -->
<div id="comparar" class="secao">

<h2>Comparar Planos</h2>

País:
<select id="pais2"></select>

Cliente:
<select id="cliente2"></select>

<br><br>

Plano 1:
<select id="pacote1"></select>

Plano 2:
<select id="pacote2"></select>

Plano 3:
<select id="pacote3"></select>

<br><br>
<button onclick="comparar()">Comparar</button>

<table>
<thead id="thead-comparar"></thead>
<tbody id="tabela-comparar"></tbody>
</table>

</div>

<script>

let dados = [];
let todosCanais = [];

// ================= CARREGAR CSV =================
fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.replace(/\r/g,'').split('\n');

  linhas.forEach((linha, i) => {

    if (i === 0) return;

    const col = linha.split(';').map(c => c.trim());

    const pais = col[0];
    const cliente = col[1];
    const pacote = col[2];
    const vc = col[3];
    const canal = col[4]?.toUpperCase(); // ✅ MAIÚSCULO
    const resolucao = col[7];

    if (pais && cliente && pacote && canal) {
      dados.push({ pais, cliente, pacote, canal, vc, resolucao });
      todosCanais.push({ canal, vc, resolucao });
    }
  });

  // remover duplicados
  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c => [c.canal, c]))
  );

  init();
});

// ================= INIT =================
function init() {
  carregarPaises('pais');
  carregarPaises('pais2');
}

// ================= TROCA TELA =================
function mostrar(id) {
  document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

// ================= CARREGAR PAIS =================
function carregarPaises(id) {

  const select = document.getElementById(id);

  const lista = [...new Set(dados.map(d => d.pais))].sort();

  select.innerHTML = '<option value="">Seleccionar</option>';

  lista.forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });

}

// ================= VALIDAR =================

document.getElementById('pais').addEventListener('change', function() {

  const clientes = [...new Set(
    dados.filter(d => d.pais === this.value).map(d => d.cliente)
  )];

  const select = document.getElementById('cliente');
  select.innerHTML = '<option value="">Seleccionar</option>';

  clientes.forEach(c => {
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });

});

document.getElementById('cliente').addEventListener('change', function() {

  const pais = document.getElementById('pais').value;

  const pacotes = [...new Set(
    dados.filter(d => d.pais === pais && d.cliente === this.value).map(d => d.pacote)
  )];

  const select = document.getElementById('pacotes');
  select.innerHTML = '<option value="">Seleccionar</option>';

  pacotes.forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });

});

document.getElementById('pacotes').addEventListener('change', function() {

  const pais = document.getElementById('pais').value;
  const cliente = document.getElementById('cliente').value;
  const pacote = this.value;

  const lista = dados.filter(d =>
    d.pais === pais && d.cliente === cliente && d.pacote === pacote
  );

  const canaisSet = new Set(lista.map(d => d.canal));

  const tabela = document.getElementById('tabela-validar');
  tabela.innerHTML = '';

  todosCanais
    .sort((a, b) => Number(a.vc) - Number(b.vc)) // ✅ ORDEM NUMÉRICA
    .forEach(c => {

      const pertence = canaisSet.has(c.canal);

      tabela.innerHTML += `
        <tr>
          <td>${c.vc}</td>
          <td>${c.canal}</td>
          <td>${c.resolucao}</td>
          <td class="${pertence ? 'si' : 'no'}">
            ${pertence ? 'SI' : 'NO'}
          </td>
        </tr>`;
    });

});

// ================= COMPARAR =================

document.getElementById('pais2').addEventListener('change', function() {

  const clientes = [...new Set(
    dados.filter(d => d.pais === this.value).map(d => d.cliente)
  )];

  const select = document.getElementById('cliente2');
  select.innerHTML = '<option value="">Seleccionar</option>';

  clientes.forEach(c => {
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });

});

document.getElementById('cliente2').addEventListener('change', function() {

  const pais = document.getElementById('pais2').value;

  const pacotes = [...new Set(
    dados.filter(d => d.pais === pais && d.cliente === this.value).map(d => d.pacote)
  )];

  ['pacote1','pacote2','pacote3'].forEach(id => {

    const select = document.getElementById(id);
    select.innerHTML = '<option value="">Seleccionar</option>';

    pacotes.forEach(p => {
      select.innerHTML += `<option value="${p}">${p}</option>`;
    });

  });

});

// ================= FUNÇÃO COMPARAR =================
function comparar() {

  const pais = document.getElementById('pais2').value;
  const cliente = document.getElementById('cliente2').value;

  const planos = [
    document.getElementById('pacote1').value,
    document.getElementById('pacote2').value,
    document.getElementById('pacote3').value
  ].filter(p => p);

  if (planos.length === 0) {
    alert("Selecione pelo menos um plano");
    return;
  }

  let thead = '<tr><th>Channel</th><th>Canal</th><th>Resolução</th>';

  planos.forEach(p => thead += `<th>${p}</th>`);

  thead += '</tr>';

  document.getElementById('thead-comparar').innerHTML = thead;

  let html = '';

  todosCanais
    .sort((a, b) => Number(a.vc) - Number(b.vc)) // ✅ ORDEM NUMÉRICA
    .forEach(c => {

      html += `<tr>
        <td>${c.vc}</td>
        <td>${c.canal}</td>
        <td>${c.resolucao}</td>`;

      planos.forEach(p => {

        const pertence = dados.some(d =>
          d.pais === pais &&
          d.cliente === cliente &&
          d.pacote === p &&
          d.canal === c.canal
        );

        html += `<td class="${pertence ? 'si' : 'no'}">
          ${pertence ? 'SI' : 'NO'}
        </td>`;
      });

      html += '</tr>';
    });

  document.getElementById('tabela-comparar').innerHTML = html;
}

</script>

</body>
</html>
