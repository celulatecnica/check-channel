<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comparar Planos</title>

<style>

/* HEADER */
.top-bar { height: 44px; background: #fbfbfd; }
.sub-bar { height: 440px; background: #f5f5f7; }

/* BODY */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: white;
  color: #272727;
}

/* CONTAINER */
.container {
  width: 1076px;
  margin: auto;
  text-align: center;
}

/* TÍTULO */
h1 {
  margin-top: 47px;
  margin-bottom: 47px;
  font-size: 52px;
  font-weight: 700;
}

.linha {
  border-bottom: 1px solid #dadade;
}

h2 {
  margin-top: 30px;
}

/* ✅ STICKY CORRETO (SEM TRAVAR SCROLL) */
.sticky-bloco {
  position: sticky;
  top: 0;

  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(6px);

  z-index: 10;

  padding-bottom: 12px;
}

/* BANDEIRAS */
.bandeira {
  display: inline-block;
  width: 72px;
  height: 48px;
  margin: 6px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
}

.bandeira img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.bandeira.active {
  border-color: #007aff;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 17px;
  margin-top: 24px;
}

.pacote h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.grupo-selects {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* SELECT */
select {
  display: block;
  width: 100%;
  height: 70px;
  padding: 0 20px;
  border-radius: 16px;
  border: none;
  background: #f5f5f7;
  font-size: 18px;
  appearance: none;
  color: #272727;
}

select:invalid { color: #b5b5b8; }

/* BOTÃO */
button {
  margin-top: 30px;
  height: 39px;
  padding: 0 32px;
  background: #0071e3;
  color: white;
  border: none;
  border-radius: 16px;
  cursor: pointer;
}

/* ✅ TABELA COM ESPAÇO PARA SCROLL NORMAL */
table {
  margin-top: 120px;
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border: 1px solid #ddd;
}

.si { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }

</style>
</head>

<body>

<div class="top-bar"></div>
<div class="sub-bar"></div>

<div class="container">

<h1>Compare los planes de programación</h1>

<div class="linha"></div>

<!-- ✅ BLOCO STICKY -->
<div class="sticky-bloco">

  <h2>Selecciona el país</h2>

  <div id="bandeiras"></div>

  <div class="grid">

    <div class="pacote">
      <h3>Paquete 1</h3>
      <div class="grupo-selects">
        <select id="cliente1" required>
          <option value="" disabled selected>Selecciona el tipo de cliente</option>
        </select>
        <select id="pacote1" required>
          <option value="" disabled selected>Selecciona el paquete</option>
        </select>
      </div>
    </div>

    <div class="pacote">
      <h3>Paquete 2</h3>
      <div class="grupo-selects">
        <select id="cliente2" required>
          <option value="" disabled selected>Selecciona el tipo de cliente</option>
        </select>
        <select id="pacote2" required>
          <option value="" disabled selected>Selecciona el paquete</option>
        </select>
      </div>
    </div>

    <div class="pacote">
      <h3>Paquete 3</h3>
      <div class="grupo-selects">
        <select id="cliente3" required>
          <option value="" disabled selected>Selecciona el tipo de cliente</option>
        </select>
        <select id="pacote3" required>
          <option value="" disabled selected>Selecciona el paquete</option>
        </select>
      </div>
    </div>

  </div>

</div>

<button onclick="comparar()">Comparar</button>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

/* DADOS */
let dados = [];
let todosCanais = [];
let paisSelecionado = "";

/* CSV */
fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.replace(/\r/g,'').split('\n');

  linhas.forEach((linha,i)=>{

    if(i===0)return;

    const col = linha.split(';').map(c=>c.trim());

    const pais = col[0];
    const cliente = col[1];
    const pacote = col[2];
    const vc = col[3];
    const canal = col[4]?.toUpperCase();
    const resolucao = col[7];

    if(pais){
      dados.push({pais,cliente,pacote,canal,vc,resolucao});
      todosCanais.push({canal,vc,resolucao});
    }

  });

  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c=>[c.canal,c]))
  );

  carregarBandeiras();

});

/* BANDEIRAS */
function carregarBandeiras(){

  const container = document.getElementById('bandeiras');

  const paises = [...new Set(dados.map(d=>d.pais))];

  paises.forEach(p => {

    const div = document.createElement('div');
    div.className = 'bandeira';

    const img = document.createElement('img');
    img.src = `flags/${p.toLowerCase().replace(/\s+/g,'')}.png`;

    div.appendChild(img);

    div.onclick = () => selecionarPais(p, div);

    container.appendChild(div);

  });

}

/* SELECIONAR PAÍS */
function selecionarPais(pais, elemento){

  paisSelecionado = pais;

  document.querySelectorAll('.bandeira')
    .forEach(b => b.classList.remove('active'));

  elemento.classList.add('active');

  const clientes = [...new Set(
    dados.filter(d=>d.pais===pais).map(d=>d.cliente)
  )];

  ['cliente1','cliente2','cliente3'].forEach(id=>{

    const select = document.getElementById(id);

    select.innerHTML =
      '<option value="" disabled selected>Selecciona el tipo de cliente</option>';

    clientes.forEach(c=>{
      select.innerHTML += `<option value="${c}">${c}</option>`;
    });

  });

}

/* CLIENTE -> PACOTE */
['cliente1','cliente2','cliente3'].forEach((id,index)=>{

  document.getElementById(id).addEventListener('change', function(){

    const cliente = this.value;

    const pacotes = [...new Set(
      dados
        .filter(d=>d.pais===paisSelecionado && d.cliente===cliente)
        .map(d=>d.pacote)
    )];

    const selectPacote = document.getElementById(`pacote${index+1}`);

    selectPacote.innerHTML =
      '<option value="" disabled selected>Selecciona el paquete</option>';

    pacotes.forEach(p=>{
      selectPacote.innerHTML += `<option value="${p}">${p}</option>`;
    });

  });

});

/* COMPARAR (TABELA REAL) */
function comparar(){

  const config = [
    {c:'cliente1', p:'pacote1'},
    {c:'cliente2', p:'pacote2'},
    {c:'cliente3', p:'pacote3'}
  ];

  let header = '<tr><th>Channel</th><th>Canal</th><th>Resolución</th>';
  let ativos = [];

  config.forEach(x=>{
    const cliente = document.getElementById(x.c).value;
    const pacote = document.getElementById(x.p).value;

    if(cliente && pacote){
      header += `<th>${pacote}</th>`;
      ativos.push({cliente,pacote});
    }
  });

  if (!ativos.length){
    alert("Selecciona al menos un cliente y paquete");
    return;
  }

  header += '</tr>';
  document.getElementById('thead').innerHTML = header;

  let html = '';

  todosCanais.forEach(c=>{

    html += `<tr>
      <td>${c.vc}</td>
      <td>${c.canal}</td>
      <td>${c.resolucao}</td>`;

    ativos.forEach(p=>{
      const tem = dados.some(d =>
        d.pais===paisSelecionado &&
        d.cliente===p.cliente &&
        d.pacote===p.pacote &&
        d.canal===c.canal
      );

      html += `<td class="${tem?'si':'no'}">${tem?'SI':'NO'}</td>`;
    });

    html += '</tr>';

  });

  document.getElementById('tbody').innerHTML = html;

}

</script>

</body>
</html>
