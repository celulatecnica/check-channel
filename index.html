<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comparar Planos</title>

<style>

/* ===== HEADER ===== */
.top-bar {
  height: 44px;
  background: #fbfbfd;
}
.sub-bar {
  height: 44px;
  background: #f5f5f7;
}

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: white;
}

/* ===== CONTAINER ===== */
.container {
  width: 1076px;
  margin: auto;
  text-align: center;
}

/* ===== TÍTULO ===== */
h1 {
  margin-top: 47px;
  margin-bottom: 47px;
  font-size: 52px;
  font-weight: 700;
  color: #272727;
}

/* ===== LINHA ===== */
.linha {
  border-bottom: 1px solid #dadade;
  margin: 0;
}

/* ===== SUBTÍTULO ===== */
h2 {
  margin-top: 30px;
  font-weight: normal;
}

/* ===== BANDEIRAS ===== */
.bandeiras {
  margin-top: 20px;
}

/* container */
.bandeira {
  display: inline-block;
  width: 72px;
  height: 48px;
  margin: 6px;

  border-radius: 12px;
  overflow: hidden;

  cursor: pointer;

  border: 2px solid transparent;
  background: transparent;

  transition: all 0.2s ease;
}

/* imagem */
.bandeira img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* hover */
.bandeira:hover {
  border-color: #007aff;
  transform: scale(1.05);
}

/* selecionado */
.bandeira.active {
  border-color: #007aff;
}

/* fallback */
.bandeira span {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  background: #dadade;
  font-weight: bold;
  border-radius: 12px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  margin-top: 30px;
}

/* ===== CARD ===== */
.card {
  background: #dadade;
  padding: 20px;
  border-radius: 12px;
}

/* ===== SELECT ===== */
select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #cfcfd3;
}

/* ===== BOTÃO ===== */
button {
  margin-top: 25px;
  padding: 12px 35px;
  background: #ff9900;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

/* ===== TABELA ===== */
table {
  width: 100%;
  margin-top: 40px;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border: 1px solid #ddd;
}

.si { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }

</style>

</head>

<body>

<div class="top-bar"></div>
<div class="sub-bar"></div>

<div class="container">

<h1>Compare los planes de programación</h1>

<div class="linha"></div>

<h2>Selecciona el país</h2>

<div class="bandeiras" id="bandeiras"></div>

<div class="grid">

  <div class="card">
    <h3>Paquete 1</h3>
    <select id="cliente1"></select>
    <select id="pacote1"></select>
  </div>

  <div class="card">
    <h3>Paquete 2</h3>
    <select id="cliente2"></select>
    <select id="pacote2"></select>
  </div>

  <div class="card">
    <h3>Paquete 3</h3>
    <select id="cliente3"></select>
    <select id="pacote3"></select>
  </div>

</div>

<button onclick="comparar()">Comparar</button>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

let dados = [];
let todosCanais = [];
let paisSelecionado = "";

/* ===== CARREGAR CSV ===== */
fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.replace(/\r/g,'').split('\n');

  linhas.forEach((linha,i)=>{

    if(i===0)return;

    const col = linha.split(';').map(c=>c.trim());

    const pais = col[0];
    const cliente = col[1];
    const pacote = col[2];
    const vc = col[3];
    const canal = col[4]?.toUpperCase();
    const resolucao = col[7];

    if(pais && cliente && pacote){
      dados.push({pais,cliente,pacote,canal,vc,resolucao});
      todosCanais.push({canal,vc,resolucao});
    }
  });

  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c=>[c.canal,c]))
  );

  carregarBandeiras();

});

/* ===== BANDEIRAS ===== */
function carregarBandeiras(){

  const container = document.getElementById('bandeiras');

  const paises = [...new Set(dados.map(d=>d.pais))]
    .sort((a,b)=>a.localeCompare(b));

  container.innerHTML = '';

  paises.forEach(p => {

    const fileName = p.toLowerCase().replace(/\s+/g,'');
    const path = `flags/${fileName}.png`;

    const div = document.createElement('div');
    div.className = 'bandeira';

    const img = document.createElement('img');
    img.src = path;

    img.onerror = () => {
      div.innerHTML = `<span>${p.substring(0,2).toUpperCase()}</span>`;
    };

    div.appendChild(img);

    div.onclick = () => selecionarPais(p, div);

    container.appendChild(div);
  });

}

/* ===== SELECIONAR PAIS ===== */
function selecionarPais(pais, elemento){

  paisSelecionado = pais;

  document.querySelectorAll('.bandeira')
    .forEach(b => b.classList.remove('active'));

  elemento.classList.add('active');

  const clientes = [...new Set(
    dados.filter(d=>d.pais===pais).map(d=>d.cliente)
  )];

  ['cliente1','cliente2','cliente3'].forEach(id=>{
    const select = document.getElementById(id);
    select.innerHTML = '<option value="">Seleccionar cliente</option>';

    clientes.forEach(c=>{
      select.innerHTML += `<option value="${c}">${c}</option>`;
    });
  });

}

/* ===== CLIENTE → PACOTE ===== */
['cliente1','cliente2','cliente3'].forEach((id,index)=>{

  document.getElementById(id).addEventListener('change', function(){

    const cliente = this.value;

    const pacotes = [...new Set(
      dados
      .filter(d=>d.pais===paisSelecionado && d.cliente===cliente)
      .map(d=>d.pacote)
    )];

    const selectPacote = document.getElementById(`pacote${index+1}`);
    selectPacote.innerHTML = '<option value="">Seleccionar paquete</option>';

    pacotes.forEach(p=>{
      selectPacote.innerHTML += `<option value="${p}">${p}</option>`;
    });

  });

});

/* ===== COMPARAR ===== */
function comparar(){

  const config = [
    {c:'cliente1', p:'pacote1'},
    {c:'cliente2', p:'pacote2'},
    {c:'cliente3', p:'pacote3'}
  ];

  let header = '<tr><th>Channel</th><th>Canal</th><th>Resolución</th>';
  let ativos = [];

  config.forEach(x=>{
    const cliente = document.getElementById(x.c).value;
    const pacote = document.getElementById(x.p).value;

    if(cliente && pacote){
      header += `<th>${pacote}</th>`;
      ativos.push({cliente,pacote});
    }
  });

  header += '</tr>';
  document.getElementById('thead').innerHTML = header;

  let html = '';

  todosCanais
    .sort((a,b)=>Number(a.vc)-Number(b.vc))
    .forEach(c=>{

      html += `<tr>
        <td>${c.vc}</td>
        <td>${c.canal}</td>
        <td>${c.resolucao}</td>`;

      ativos.forEach(p=>{
        const tem = dados.some(d =>
          d.pais===paisSelecionado &&
          d.cliente===p.cliente &&
          d.pacote===p.pacote &&
          d.canal===c.canal
        );

        html += `<td class="${tem?'si':'no'}">${tem?'SI':'NO'}</td>`;
      });

      html += '</tr>';
    });

  document.getElementById('tbody').innerHTML = html;
}

</script>

</body>
</html>
