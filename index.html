<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Channel</title>

<style>

/* RESET */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

/* ===== ESTRUTURA BASE ===== */

.top-bar {
  position: fixed;
  left: 0;
  width: 100%;
  z-index: 999;

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  transition: all 0.25s ease;
}

.top-bar-inner {
  width: 1000px;
  max-width: calc(100% - 32px);
  margin: auto;

  height: 100%;
  display: flex;
  align-items: center;
}

/* ===== BARRA 1 (LOGO GRANDE) ===== */

.top-bar-main {
  top: 0;
  height: 80px;
  background: rgba(255,255,255,0.25);
}

/* ===== BARRA 2 (TEXTO FIXO) ===== */

.top-bar-sub {
  top: 0;
  height: 44px;
  background: rgba(255,255,255,0.95);

  opacity: 0;
  transform: translateY(-10px);
}

/* ===== LOGO ===== */

.logo-bloco {
  display: flex;
  flex-direction: column;
}

.logo {
  height: 24px;
}

.logo-texto {
  font-size: 12px;
  color: #6e6e73;
}

/* ===== TÍTULO FIXO ===== */

.titulo-pequeno {
  font-size: 18px;
  font-weight: 600;
}

/* ===== BANNER ===== */

#banner {
  width: 100%;
  display: block;
  margin-top: 80px; /* espaço para header */
}

/* só pra rolagem */
.fake-content {
  height: 1500px;
  background: #f5f5f7;
}

</style>
</head>

<body>

<!-- ✅ BARRA 1 (DESAPARECE) -->
<div class="top-bar top-bar-main" id="topbarMain">
  <div class="top-bar-inner">

    <div class="logo-bloco">
      <img src="icon_gpt_branco.png" class="logo">
      <div class="logo-texto">Comparar Canais</div>
    </div>

  </div>
</div>

<!-- ✅ BARRA 2 (FICA FIXA) -->
<div class="top-bar top-bar-sub" id="topbarSub">
  <div class="top-bar-inner">

    <div class="titulo-pequeno">Check Channel</div>

  </div>
</div>

<!-- ✅ BANNER -->
<img id="banner" src="banner.png">

<!-- conteúdo fake só pra poder rolar -->
<div class="fake-content"></div>


<script>

/* ===== SCROLL (EFEITO APPLE) ===== */

window.addEventListener('scroll', () => {

  const scrollY = window.scrollY;

  const topMain = document.getElementById('topbarMain');
  const topSub = document.getElementById('topbarSub');

  const limite = 120;

  if (scrollY > limite) {
    topMain.style.opacity = 0;
    topMain.style.pointerEvents = 'none';

    topSub.style.opacity = 1;
    topSub.style.transform = 'translateY(0)';
  } else {
    topMain.style.opacity = 1;

    topSub.style.opacity = 0;
    topSub.style.transform = 'translateY(-10px)';
  }

});

</script>

</body>
</html>
