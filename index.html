<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comparar Planos</title>

<style>

/* HEADER */
.top-bar { height: 44px; background: #fbfbfd; }
.sub-bar { height: 440px; background: #f5f5f7; }

/* BODY */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: white;
  color: #272727;
}

/* CONTAINER */
.container {
  width: 1076px;
  margin: auto;
  text-align: center;
}

/* TITULO */
h1 {
  margin-top: 47px;
  margin-bottom: 47px;
  font-size: 52px;
  position: relative;
  z-index: 20;
}

.linha {
  border-bottom: 1px solid #dadade;
  position: relative;
  z-index: 20;
}

h2 {
  margin-top: 47px;
}

/* STICKY */
.sticky-bloco {
  position: sticky;
  top: 20px;
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(6px);
  z-index: 10;
  padding-bottom: 59px;
}

.sticky-bloco::before {
  content: "";
  position: absolute;
  top: -80px;
  left: 0;
  right: 0;
  height: 80px;
  background: white;
  z-index: -1;
}

/* BANDEIRAS */
.bandeira {
  display: inline-block;
  width: 72px;
  height: 48px;
  margin: 6px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
}

.bandeira img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.bandeira.active {
  border-color: #007aff;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 17px;
  margin-top: 24px;
}

.pacote h3 {
  margin-bottom: 6px;
}

/* SELECT */
.grupo-selects {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

select {
  height: 70px;
  padding: 0 20px;
  border-radius: 16px;
  border: none;
  background: #f5f5f7;
  font-size: 18px;
}

select:invalid {
  color: #b5b5b8;
}

/* RESULTADOS */
.resultados {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 47px;
}

.coluna {
  border-top: 1px solid #dadade;
}

/* BLOCO */
.canal-bloco {
  padding: 18px 0;
  border-bottom: 1px solid #eee;
}

/* TEXTO REAL */
.canal-numero {
  font-size: 16px;
}

.canal-nome {
  font-size: 18px;
  font-weight: 600;
  margin-top: 4px;
}

.canal-tipo {
  font-size: 16px;
}

/* ✅ PLACEHOLDER (novo efeito) */
.canal-off {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.canal-off div {
  background: #f5f5f7;
  border-radius: 8px;
}

/* BLOCOS FAKE */
.fake-numero {
  width: 90px;
  height: 14px;
}

.fake-nome {
  width: 160px;
  height: 18px;
}

.fake-tipo {
  width: 110px;
  height: 14px;
}

</style>
</head>

<body>

<div class="top-bar"></div>
<div class="sub-bar"></div>

<div class="container">

<h1>Compare los planes de programación</h1>
<div class="linha"></div>

<div class="sticky-bloco">

  <h2>Selecciona el país</h2>

  <div id="bandeiras"></div>

  <div class="grid">

    <div class="pacote">
      <h3>Paquete 1</h3>
      <div class="grupo-selects">
        <select id="cliente1"></select>
        <select id="pacote1"></select>
      </div>
    </div>

    <div class="pacote">
      <h3>Paquete 2</h3>
      <div class="grupo-selects">
        <select id="cliente2"></select>
        <select id="pacote2"></select>
      </div>
    </div>

    <div class="pacote">
      <h3>Paquete 3</h3>
      <div class="grupo-selects">
        <select id="cliente3"></select>
        <select id="pacote3"></select>
      </div>
    </div>

  </div>

</div>

<div class="resultados">
  <div class="coluna" id="coluna1"></div>
  <div class="coluna" id="coluna2"></div>
  <div class="coluna" id="coluna3"></div>
</div>

</div>

<script>

let dados = [];
let todosCanais = [];
let paisSelecionado = "";

fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.split('\n');

  linhas.forEach((linha,i)=>{
    if(i===0)return;

    const col = linha.split(';').map(c=>c.trim());

    if(col[0]){
      dados.push({
        pais: col[0],
        cliente: col[1],
        pacote: col[2],
        vc: col[3],
        canal: col[4],
        resolucao: col[7]
      });

      todosCanais.push({
        canal: col[4],
        vc: col[3],
        resolucao: col[7]
      });
    }
  });

  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c=>[c.canal,c]))
  );

  carregarBandeiras();
});

/* BANDEIRAS */
function carregarBandeiras(){

  const container = document.getElementById('bandeiras');
  const paises = [...new Set(dados.map(d=>d.pais))];

  paises.forEach(p => {

    const div = document.createElement('div');
    div.className = 'bandeira';

    const img = document.createElement('img');
    img.src = `flags/${p.toLowerCase().replace(/\s+/g,'')}.png`;

    div.appendChild(img);
    div.onclick = () => selecionarPais(p, div);

    container.appendChild(div);

  });
}

/* PAÍS */
function selecionarPais(pais, elemento){

  paisSelecionado = pais;

  document.querySelectorAll('.bandeira')
    .forEach(b => b.classList.remove('active'));

  elemento.classList.add('active');

  const clientes = [...new Set(
    dados.filter(d=>d.pais===pais).map(d=>d.cliente)
  )];

  ['cliente1','cliente2','cliente3'].forEach(id=>{
    const select = document.getElementById(id);

    select.innerHTML = '<option disabled selected>Selecciona el tipo de cliente</option>';

    clientes.forEach(c=>{
      select.innerHTML += `<option value="${c}">${c}</option>`;
    });
  });
}

/* CLIENTE → PACOTE */
['cliente1','cliente2','cliente3'].forEach((id,index)=>{

  document.getElementById(id).addEventListener('change', function(){

    const cliente = this.value;

    const pacotes = [...new Set(
      dados.filter(d=>d.pais===paisSelecionado && d.cliente===cliente)
      .map(d=>d.pacote)
    )];

    const selectPacote = document.getElementById(`pacote${index+1}`);

    selectPacote.innerHTML = '<option disabled selected>Selecciona el paquete</option>';

    pacotes.forEach(p=>{
      selectPacote.innerHTML += `<option value="${p}">${p}</option>`;
    });

  });

});

/* AUTO */
['pacote1','pacote2','pacote3'].forEach(id=>{
  document.getElementById(id).addEventListener('change', ()=>comparar());
});

/* ✅ RENDER COM MÁSCARA */
function comparar(){

  const config = [
    {cliente:'cliente1', pacote:'pacote1', col:'coluna1'},
    {cliente:'cliente2', pacote:'pacote2', col:'coluna2'},
    {cliente:'cliente3', pacote:'pacote3', col:'coluna3'}
  ];

  config.forEach(cfg=>{

    const cliente = document.getElementById(cfg.cliente).value;
    const pacote = document.getElementById(cfg.pacote).value;

    const coluna = document.getElementById(cfg.col);
    coluna.innerHTML = '';

    if(!cliente || !pacote) return;

    todosCanais.forEach(c=>{

      const existe = dados.some(d =>
        d.pais===paisSelecionado &&
        d.cliente===cliente &&
        d.pacote===pacote &&
        d.canal===c.canal
      );

      const tipo = c.canal.includes("INT") ? "Internacional" : "Nacional";

      if (existe) {

        coluna.innerHTML += `
          <div class="canal-bloco">
            <div class="canal-numero">${c.vc} [${c.resolucao}]</div>
            <div class="canal-nome">${c.canal}</div>
            <div class="canal-tipo">${tipo}</div>
          </div>
        `;

      } else {

        coluna.innerHTML += `
          <div class="canal-bloco canal-off">
            <div class="fake-numero"></div>
            <div class="fake-nome"></div>
            <div class="fake-tipo"></div>
          </div>
        `;

      }

    });

  });

}

</script>

</body>
</html>
