<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DIRECTV - Check Channel</title>

<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0F0F0F;
  color: #f5f5f7;
}

/* ===== BASE ===== */
.top-bar {
  position: fixed;
  left: 0;
  width: 100%;
  z-index: 999;

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
}

.top-bar-inner {
  width: 950px;
  max-width: calc(100% - 32px);
  margin: auto;

  height: 100%;
  display: flex;
  align-items: center;
}

/* ===== BARRA 1 (Fina - logo) ===== */

.top-bar-main {
  position: fixed;
  top: 0;
  width: 100%;
  height: 45px;
}

/* ✅ camada de blur separada */
.blur-layer {
  position: absolute;
  inset: 0;

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  background: rgba(15,15,15); /* controla clareamento */
  z-index: 1;
}

/* ✅ conteúdo fica acima → não sofre blur */
.top-bar-inner {
  position: relative;
  z-index: 2;
}



/* ===== BARRA 2 (Grossa - título) ===== */
.top-bar-sub {
  top: 45px;
  height: 55px;
  background: rgba(0,0,0,0.2); /* ✅ leve, mas sem “lavar” */
  border-bottom: 1px solid #4D4D4D; /* ✅ linha full width */
}

/* ===== LOGO ===== */
.logo {
  height: 20px;
  display: block;
}

/* ===== TITULO ===== */
.titulo-pequeno {
  font-size: 21px;
  font-weight: 600;
}

/* ===== BANNER ===== */
#banner {
  width: 100%;
  display: block;
}

/* espaço pra scroll */
.fake-content {
  height: 1500px;
  background: #0F0F0F;
}

/* ===== CONTAINER ===== */
.container {
  width: 950px;
  max-width: calc(100% - 32px);
  margin: auto;
  text-align: center;
}

/* ===== TÍTULO PRINCIPAL ===== */
.titulo-principal {
  font-size: 32px;
  margin-top: 47px;
  margin-bottom: 47px;
  font-weight: 600; /* ✅ semibold */
}
  
.linha {
  width: 100%;
  border-bottom: 1px solid #4D4D4D;
  margin-bottom: 47px; /* ✅ espaço abaixo */
}

/* ===== TITULO DE SEÇÃO ===== */
.titulo-secao {
  width: 950px;
  max-width: calc(100% - 32px);
  margin: auto;

  margin-top: 47px;   /* ✅ distância superior */
  margin-bottom: 23px; /* ✅ distância inferior */

  font-size: 24px;
  font-weight: 600; /* ✅ semibold */

  text-align: center;
}

#bandeiras {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;

  margin-bottom: 47px;
}

.bandeira {
  width: 72px;
  height: 48px;
  margin: 6px;

  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;

  border: 2px solid transparent;
  box-shadow: 0 0 0 4px transparent;

  transition: all 0.25s ease;
}

.bandeira img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.bandeira.active {
  box-shadow:
    0 0 0 3px #0F0F0F,  /* ✅ espaço (cor do fundo) */
    0 0 0 5px #0071e3;  /* ✅ borda branca */
}
  
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;

  margin-top: 24px;
}

/* título pacote */
.titulo-pacote {
  font-size: 24px;       /* ✅ aumenta */
  font-weight: 600;      /* mantém semibold */
  margin-bottom: 20px;   /* ✅ mais respiro abaixo */
  color: #f5f5f7;        /* ✅ mais contraste no dark */
}

/* selects agrupados */
.grupo-selects {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* estilo dos selects */
select {
  height: 60px;
  padding: 0 20px;

  border-radius: 16px;
  border: none;

  font-size: 17px;

  background: #2A2A2A; /* dark */
  color: #f5f5f7;

  appearance: none;
}

/* placeholder mais claro */
select:invalid {
  color: #9e9e9e;
}
  
</style>
</head>

<body>

<!-- ✅ BARRA 1 -->

<div class="top-bar top-bar-main" id="topbarMain">

  <!-- ✅ camada com blur -->
  <div class="blur-layer"></div>

  <!-- ✅ conteúdo (NÃO sofre blur) -->
  <div class="top-bar-inner">
    <img src="icon_gpt_branco.png" class="logo">
  </div>

</div>

<!-- ✅ BARRA 2 -->
<div class="top-bar top-bar-sub" id="topbarSub">
  <div class="top-bar-inner">
    <div class="titulo-pequeno">Check Channel</div>
  </div>
</div>

<!-- ✅ BANNER -->
<img id="banner" src="banner.png">

<div class="container">

  <h1 class="titulo-principal">
    Consulte los planes de programación
  </h1>

  <div class="linha"></div>

  <div class="titulo-secao">
    Seleccione el país
  </div>

  <div id="bandeiras"></div>

  <div class="grid">

  <!-- PACOTE 1 -->
  <div class="pacote">
    <div class="titulo-pacote">Paquete principal</div>

    <div class="grupo-selects">
      <select>
        <option disabled selected>Selecciona el tipo de cliente</option>
      </select>

      <select>
        <option disabled selected>Selecciona el paquete</option>
      </select>
    </div>
  </div>

  <!-- PACOTE 2 -->
  <div class="pacote">
    <div class="titulo-pacote">Comparación 1</div>

    <div class="grupo-selects">
      <select>
        <option disabled selected>Selecciona el tipo de cliente</option>
      </select>

      <select>
        <option disabled selected>Selecciona el paquete</option>
      </select>
    </div>
  </div>

  <!-- PACOTE 3 -->
  <div class="pacote">
    <div class="titulo-pacote">Comparación 2</div>

    <div class="grupo-selects">
      <select>
        <option disabled selected>Selecciona el tipo de cliente</option>
      </select>

      <select>
        <option disabled selected>Selecciona el paquete</option>
      </select>
    </div>
  </div>

</div>
  
</div>

<div class="fake-content"></div>

<script>

window.addEventListener('scroll', () => {

  const scrollY = window.scrollY;

  const topMain = document.getElementById('topbarMain');
  const topSub = document.getElementById('topbarSub');

  const limite = 70;

  let progresso = scrollY / limite;
  if (progresso > 1) progresso = 1;

  const movimento = -50 * progresso;

  topMain.style.transform = `translateY(${movimento}px)`;
  topSub.style.transform = `translateY(${movimento}px)`;

});

let dados = [
  { pais: "Argentina" },
  { pais: "Chile" },
  { pais: "Colombia" },
  { pais: "Ecuador" },
  { pais: "Mexico" },
  { pais: "Peru" },
  { pais: "Puerto Rico" },
  { pais: "Uruguay" }
];
  
function carregarBandeiras(){
  const paises = [...new Set(dados.map(d => d.pais))]
    .sort((a, b) => a.localeCompare(b));

  const container = document.getElementById('bandeiras');

  paises.forEach(p => {
    const div = document.createElement('div');
    div.className = 'bandeira';

    const img = document.createElement('img');
    img.src = `flags/${p.toLowerCase().replace(/\s+/g,'')}.png`;

    div.appendChild(img);
    div.onclick = () => selecionarPais(p, div);

    container.appendChild(div);
  });
}

function selecionarPais(pais, elemento){

  const jaAtiva = elemento.classList.contains('active');

  // remove todos
  document.querySelectorAll('.bandeira')
    .forEach(b => b.classList.remove('active'));

  // se NÃO estava ativa, ativa
  if (!jaAtiva) {
    elemento.classList.add('active');
  }

}
  
carregarBandeiras();
  
</script>

</body>
</html>
