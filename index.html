<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DIRECTV - Check Channel</title>

<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0F0F0F;
  color: #f5f5f7;
}

/* ===== BASE DAS BARRAS ===== */
.top-bar {
  position: fixed;
  left: 0;
  width: 100%;
  z-index: 999;

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
}

.top-bar-inner {
  width: 1000px;
  max-width: calc(100% - 32px);
  margin: auto;

  height: 100%;
  display: flex;
  align-items: center;
}

/* ===== BARRA 1 ===== */
.top-bar-main {
  top: 0;
  height: 80px;
  background: rgba(15,15,15,0.6);
}

/* ===== BARRA 2 ===== */
.top-bar-sub {
  top: 80px;
  height: 44px;
  background: rgba(15,15,15,0.9);
}

/* ===== LOGO ===== */
.logo {
  height: 22px;
}

/* ===== TÍTULO ===== */
.titulo-pequeno {
  font-size: 18px;
  font-weight: 600;
}

/* ===== BANNER ===== */
#banner {
  width: 100%;
  display: block;
  margin-top: 124px;
}

/* espaço pra testar scroll */
.fake-content {
  height: 1500px;
  background: #0F0F0F;
}

</style>
</head>

<body>

<!-- ✅ BARRA 1 (LOGO) -->
<div class="top-bar top-bar-main" id="topbarMain">
  <div class="top-bar-inner">
    <img src="icon_gpt_branco.png" class="logo">
  </div>
</div>

<!-- ✅ BARRA 2 (TEXTO) -->
<div class="top-bar top-bar-sub" id="topbarSub">
  <div class="top-bar-inner">
    <div class="titulo-pequeno">Check Channel</div>
  </div>
</div>

<!-- ✅ BANNER -->
<img id="banner" src="banner.png">

<div class="fake-content"></div>

<script>

/* ===== TRANSIÇÃO SUAVE (ESTILO APPLE) ===== */

window.addEventListener('scroll', () => {

  const scrollY = window.scrollY;

  const topMain = document.getElementById('topbarMain');
  const topSub = document.getElementById('topbarSub');

  const limite = 80;

  /* progresso de 0 a 1 */
  let progresso = scrollY / limite;
  if (progresso > 1) progresso = 1;

  /* movimentos sincronizados */
  const move = -80 * progresso;

  topMain.style.transform = `translateY(${move}px)`;
  topSub.style.transform = `translateY(${move}px)`;

});

</script>

</body>
</html>
