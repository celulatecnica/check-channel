<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comparar Planos</title>

<style>

/* ===== HEADER ===== */
.top-bar {
  height: 44px;
  background: #fbfbfd;
}
.sub-bar {
  height: 44px;
  background: #f5f5f7;
}

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff;
}

/* ===== CONTAINER ===== */
.container {
  width: 1100px;
  margin: auto;
  text-align: center;
}

/* ===== TÍTULO ===== */
h1 {
  margin-top: 40px;
  font-size: 42px;
}

/* ===== LINHA ===== */
.linha {
  width: 100%;
  border-bottom: 1px solid #dadade;
  margin: 20px 0;
}

/* ===== SUBTÍTULO ===== */
h2 {
  font-weight: normal;
  margin-top: 30px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  margin-top: 30px;
}

/* ===== CARD ===== */
.card {
  background: #dadade;
  padding: 20px;
  border-radius: 12px;
}

/* ===== SELECT ===== */
select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #cfcfd3;
}

/* ===== BOTÃO ===== */
button {
  margin-top: 25px;
  padding: 12px 35px;
  background: #ff9900;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== TABLE ===== */
table {
  margin-top: 40px;
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border: 1px solid #ddd;
}

.si { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }

</style>
</head>

<body>

<div class="top-bar"></div>
<div class="sub-bar"></div>

<div class="container">

<h1>Compare los planes de programación</h1>
<div class="linha"></div>

<h2>Selecciona el país</h2>
<select id="pais"></select>

<!-- PLANOS -->
<div class="grid">

  <div class="card">
    <h3>Paquete 1</h3>
    <select id="cliente1"></select>
    <select id="pacote1"></select>
  </div>

  <div class="card">
    <h3>Paquete 2</h3>
    <select id="cliente2"></select>
    <select id="pacote2"></select>
  </div>

  <div class="card">
    <h3>Paquete 3</h3>
    <select id="cliente3"></select>
    <select id="pacote3"></select>
  </div>

</div>

<button onclick="comparar()">Comparar</button>

<!-- TABELA -->
<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

let dados = [];
let todosCanais = [];

// ===== CARREGAR CSV =====
fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.replace(/\r/g,'').split('\n');

  linhas.forEach((linha,i)=>{

    if(i===0)return;

    const col = linha.split(';').map(c=>c.trim());

    const pais = col[0];
    const cliente = col[1];
    const pacote = col[2];
    const vc = col[3];
    const canal = col[4]?.toUpperCase();
    const resolucao = col[7];

    if(pais && cliente && pacote){
      dados.push({pais,cliente,pacote,canal,vc,resolucao});
      todosCanais.push({canal,vc,resolucao});
    }
  });

  // remove duplicados
  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c=>[c.canal,c]))
  );

  carregarPais();
});

// ===== CARREGAR PAIS =====
function carregarPais(){
  const select = document.getElementById('pais');

  const lista = [...new Set(dados.map(d=>d.pais))].sort();

  select.innerHTML = '<option value="">Seleccionar</option>';

  lista.forEach(p=>{
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });
}

// ===== AO MUDAR PAIS =====
document.getElementById('pais').addEventListener('change', function(){

  const pais = this.value;

  const clientes = [...new Set(
    dados.filter(d=>d.pais===pais).map(d=>d.cliente)
  )];

  ['cliente1','cliente2','cliente3'].forEach(id=>{

    const select = document.getElementById(id);
    select.innerHTML = '<option value="">Seleccionar cliente</option>';

    clientes.forEach(c=>{
      select.innerHTML += `<option value="${c}">${c}</option>`;
    });
  });

});

// ===== CLIENTE → PACOTES =====
['cliente1','cliente2','cliente3'].forEach((id,index)=>{

  document.getElementById(id).addEventListener('change', function(){

    const pais = document.getElementById('pais').value;
    const cliente = this.value;

    const pacotes = [...new Set(
      dados
      .filter(d=>d.pais===pais && d.cliente===cliente)
      .map(d=>d.pacote)
    )];

    const selectPacote = document.getElementById(`pacote${index+1}`);

    selectPacote.innerHTML = '<option value="">Seleccionar paquete</option>';

    pacotes.forEach(p=>{
      selectPacote.innerHTML += `<option value="${p}">${p}</option>`;
    });

  });

});

// ===== COMPARAR =====
function comparar(){

  const pais = document.getElementById('pais').value;

  const config = [
    {c:'cliente1', p:'pacote1'},
    {c:'cliente2', p:'pacote2'},
    {c:'cliente3', p:'pacote3'}
  ];

  let header = '<tr><th>Channel</th><th>Canal</th><th>Resolución</th>';
  let ativos = [];

  config.forEach(x=>{
    const cliente = document.getElementById(x.c).value;
    const pacote = document.getElementById(x.p).value;

    if(cliente && pacote){
      header += `<th>${pacote}</th>`;
      ativos.push({cliente,pacote});
    }
  });

  header += '</tr>';
  document.getElementById('thead').innerHTML = header;

  let html = '';

  todosCanais
    .sort((a,b)=>Number(a.vc)-Number(b.vc))
    .forEach(c=>{

      html += `<tr>
        <td>${c.vc}</td>
        <td>${c.canal}</td>
        <td>${c.resolucao}</td>`;

      ativos.forEach(p=>{

        const tem = dados.some(d =>
          d.pais===pais &&
          d.cliente===p.cliente &&
          d.pacote===p.pacote &&
          d.canal===c.canal
        );

        html += `<td class="${tem?'si':'no'}">
          ${tem?'SI':'NO'}
        </td>`;
      });

      html += '</tr>';
    });

  document.getElementById('tbody').innerHTML = html;
}

</script>

</body>
</html>
