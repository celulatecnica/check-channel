<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Check Channel - Comparar Planos</title>

<style>

/* HEADER */
.top-bar {
  height: 44px;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 999;

  background: rgba(15,15,15,0.6);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  transition: opacity 0.3s ease;
}

/* ✅ AJUSTE DO LOGO (NOVO) */
.top-bar-inner {
  width: 1076px;
  height: 100%;
  margin: auto;
  display: flex;
  align-items: center;
  padding-left: 4px;
}

.logo {
  height: 18px;
  width: auto;
  display: block;
}

/* REMOVE espaço antigo */
.sub-bar { height: 0px; background: #f5f5f7; }

/* BODY */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0F0F0F;
  color: #f5f5f7;
}

/* COMPENSA HEADER FIXO */

.conteudo {
  padding-top: 0px;
  padding-bottom: 250px;
  transition: padding 0.4s ease;
}

.conteudo.sem-espaco {
  padding-bottom: 0;
}


/* CONTAINER */
.container {
  width: 1076px;
  margin: auto;
  text-align: center;
  background: transparent;
}

/* TITULO */
h1 {
  margin-top: 47px;
  margin-bottom: 47px;
  font-size: 52px;
  position: relative;
  z-index: 20;
}

.linha {
  border-bottom: 1px solid #2a2a2e;
  position: relative;
  z-index: 20;
}

h2 {
  margin-top: 47px;
}



/* STICKY */
.sticky-bloco {
  position: sticky;
  top: 20px;
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(6px);
  z-index: 10;
  padding-bottom: 35px;
}

.sticky-bloco::before {
  content: "";
  position: absolute;
  top: -80px;
  left: 0;
  right: 0;
  height: 80px;
  background: #0F0F0F;
  z-index: -1;
}

/* BANDEIRAS */
.bandeira {
  display: inline-block;
  width: 72px;
  height: 48px;
  margin: 6px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

.bandeira img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}


.bandeira.active {
  border: 2px solid rgba(0,0,0,0.2);
  box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
}



.bandeira {
  border: 2px solid transparent;
  box-shadow: 0 0 0 4px transparent;
}




/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 17px;
  margin-top: 24px;
}
  
.sticky-bloco.compacto .grid {
  margin-top: 12px; /* ✅ reduz o espaço */
}

.pacote h3 {
  margin-bottom: 20px;
}

/* SELECT */
.grupo-selects {
  display: flex;
  flex-direction: column;
  gap: 6px;
}


select {
  height: 70px;
  padding: 0 50px 0 20px; /* ✅ mais espaço real */
  border-radius: 16px;
  border: none;
  background: #1c1c1f;
  color: #f5f5f7 ;
  font-size: 18px;

  appearance: none;           /* ✅ remove estilo padrão */
  -webkit-appearance: none;   /* ✅ Chrome/Safari */
  -moz-appearance: none;      /* ✅ Firefox */

  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg width='14' height='14' viewBox='0 0 20 20' fill='none' stroke='%23272727' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 8l4 4 4-4'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 20px center; /* ✅ controla a posição */
}


select:invalid {
  color: #a1a1aa;
}

/* RESULTADOS */
.resultados {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 0px;
}

.coluna {
  border-top: 1px solid #2a2a2e;
  display: flex;
  flex-direction: column;
}

/* BLOCO */
.canal-bloco {
  height: 110px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-bottom: 1px solid #2a2a2e;
}

/* NUMERO */
.canal-numero {
  font-size: 16px;
}

/* NOME */
.canal-nome {
  font-size: 18px;
  font-weight: 600;
  margin-top: 4px;
}

/* TAGS */
.canal-tags {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
}

.canal-badge {
  background: #222226;
  color: #a1a1aa;
  border-radius: 8px;
  padding: 2px 8px;
  font-size: 16px;
}

/* PLACEHOLDER */
.canal-off {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.canal-off div {
  background: #2a2a2e;
  border-radius: 8px;
}

.fake-numero {
  width: 90px;
  height: 14px;
}

.fake-nome {
  width: 160px;
  height: 18px;
}

.fake-tipo {
  width: 110px;
  height: 14px;
}

/* ✅ AJUSTADO */
.rodape {
  height: 1080px;
  background: #F5F5F7;
  margin-top: 47px;
  display: none;
}

  /* ===== NOVO: COMPACTAÇÃO DO STICKY ===== */

.sticky-bloco.compacto {
  padding-bottom: 15px;
}


.sticky-bloco.compacto h2 {
  margin-top: 20px;
  font-size: 18px; /* ✅ mesmo tamanho do h3 */
  font-weight: 700; /* ✅ opcional (fica igual visual do paquete) */
}



/* ✅ controla o espaçamento real no modo compacto */
.sticky-bloco.compacto #bandeiras {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
}

/* ✅ remove conflito de margem e aplica escala */

.sticky-bloco.compacto .bandeira {
  width: 58px;   /* ✅ menor que 72 */
  height: 38px;  /* ✅ mantém proporção */
  margin: 4px;   /* ✅ menor espaço real */
}




.sticky-bloco.compacto 
#bandeiras {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px; /* ✅ controla o espaço corretamente */
}


/* animação suave */
.sticky-bloco,
.bandeira,
.sticky-bloco h2 {
  transition: all 0.3s ease;
}

/* ===== BARRA DE CATEGORIAS ===== */
.barra-categorias {
  width: 100%;
  background: #ffffff;
  color: #1d1d1f;
  border-top: 1px solid #e5e5ea;
  border-bottom: 1px solid #e5e5ea;

  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 18px;

  padding: 16px 20px;
  margin-top: 30px;

  font-size: 16px;
  font-weight: 500;

  position: relative;
  z-index: 5;

  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
}

.barra-categorias.ativa {
  opacity: 1;
  transform: translateY(0);
}

/* categoria item */
.categoria-item {
  display: flex;
  gap: 6px;
}

.categoria-nome {
  color: #1d1d1f;
}

.categoria-qtd {
  color: #6e6e73;
}

/* ===== FUNDO BRANCO RESULTADOS ===== */
.resultados {
  background: #ffffff;
  padding-top: 20px;
}

/* canais em tema claro */
.coluna {
  border-top: 1px solid #e5e5ea;
}

.canal-bloco {
  border-bottom: 1px solid #e5e5ea;
}

.canal-nome {
  color: #1d1d1f;
}

.canal-numero {
  color: #6e6e73;
}

.canal-badge {
  background: #f2f2f7;
  color: #1d1d1f;
}

/* placeholders claros */
.canal-off div {
  background: #e5e5ea;
}

/* ===== esconder no scroll (efeito elegante) ===== */
.barra-categorias.oculta {
  opacity: 0;
  transform: translateY(-10px);
}
  
</style>
  
</head>

<body>

<div class="conteudo">

<div class="top-bar" id="topbar">
  <div class="top-bar-inner">
    <img src="icon_gpt_branco.png" class="logo">
  </div>
</div>

<img id="banner" src="banner.png" style="width:100%; display:block;">

<div class="sub-bar"></div>

<div class="container">

<h1>Compare los planes de programación</h1>
<div class="linha"></div>

<div class="sticky-bloco">

<h2>Selecciona el país</h2>
<div id="bandeiras"></div>

<div class="grid">

<div class="pacote">
<h3>Paquete 1</h3>
<div class="grupo-selects">
<select id="cliente1">
<option value="" disabled selected>Selecciona el tipo de cliente</option>
</select>
<select id="pacote1">
<option value="" disabled selected>Selecciona el paquete</option>
</select>
</div>
</div>

<div class="pacote">
<h3>Paquete 2</h3>
<div class="grupo-selects">
<select id="cliente2">
<option value="" disabled selected>Selecciona el tipo de cliente</option>
</select>
<select id="pacote2">
<option value="" disabled selected>Selecciona el paquete</option>
</select>
</div>
</div>

<div class="pacote">
<h3>Paquete 3</h3>
<div class="grupo-selects">
<select id="cliente3">
<option value="" disabled selected>Selecciona el tipo de cliente</option>
</select>
<select id="pacote3">
<option value="" disabled selected>Selecciona el paquete</option>
</select>
</div>
</div>

</div>

</div>

<div id="barra-categorias" class="barra-categorias"></div>
  
<div class="resultados">
<div class="coluna" id="coluna1"></div>
<div class="coluna" id="coluna2"></div>
<div class="coluna" id="coluna3"></div>
</div>

</div>

<div class="rodape"></div>

</div>

<script>

/* ✅ EFEITO APPLE */
window.addEventListener('scroll', () => {
  const banner = document.getElementById('banner');
  const topbar = document.getElementById('topbar');

  const bannerHeight = banner.offsetHeight;
  const scrollY = window.scrollY;

  let opacity = 1 - (scrollY / bannerHeight);

  if (opacity < 0) opacity = 0;

  topbar.style.opacity = opacity;
});

/* ================= SEU SCRIPT ORIGINAL ================= */

let dados = [];
let todosCanais = [];
let paisSelecionado = "";

fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.split('\n');

  linhas.forEach((linha,i)=>{
    if(i===0)return;

    const col = linha.split(';').map(c=>c.trim());

    if(col[0]){
      dados.push({
        pais: col[0],
        cliente: col[1],
        pacote: col[2],
        vc: col[3],
        canal: col[4],
        categoria: col[5],
        resolucao: col[6]
      });

      todosCanais.push({
        canal: col[4],
        vc: col[3],
        categoria: col[5],
        resolucao: col[6]
      });
    }
  });

  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c=>[c.canal,c]))
  );

  carregarBandeiras();


  ['cliente1','cliente2','cliente3'].forEach((id,index)=>{
 
  document.getElementById(id).addEventListener('change', function(){

    const cliente = this.value;

    const pacotes = [...new Set(
      dados.filter(d=>d.pais===paisSelecionado && d.cliente===cliente)
      .map(d=>d.pacote)
    )];

    const selectPacote = document.getElementById(`pacote${index+1}`);

    selectPacote.innerHTML = '<option disabled selected>Selecciona el paquete</option>';

    pacotes.forEach(p=>{
      selectPacote.innerHTML += `<option value="${p}">${p}</option>`;
    });

  });
});

  
['pacote1','pacote2','pacote3'].forEach(id=>{
  document.getElementById(id).addEventListener('change', ()=>{
    comparar();
  });
});
});
  
function carregarBandeiras(){
  const paises = [...new Set(dados.map(d=>d.pais))]
    .sort((a, b) => a.localeCompare(b));

  const container = document.getElementById('bandeiras');

  paises.forEach(p => {
    const div = document.createElement('div');
    div.className = 'bandeira';

    const img = document.createElement('img');
    img.src = `flags/${p.toLowerCase().replace(/\s+/g,'')}.png`;

    div.appendChild(img);
    div.onclick = () => selecionarPais(p, div);

    container.appendChild(div);
  });
}

function selecionarPais(pais, elemento){
  paisSelecionado = pais;

  document.querySelectorAll('.bandeira').forEach(b => b.classList.remove('active'));
    elemento.classList.add('active');
    
  const clientes = [...new Set(dados.filter(d=>d.pais===pais).map(d=>d.cliente))];
  
  ['cliente1','cliente2','cliente3'].forEach(id=>{
    const select = document.getElementById(id);
  
    select.innerHTML = '<option disabled selected>Selecciona el tipo de cliente</option>';
  
    clientes.forEach(c=>{
      select.innerHTML += `<option value="${c}">${c}</option>`;
    });
  });
  
  /* ✅ RESET DOS PACOTES (SEPARADO) */
  ['pacote1','pacote2','pacote3'].forEach(id=>{
    const select = document.getElementById(id);
  
    select.innerHTML = '<option disabled selected>Selecciona el paquete</option>';
  });

  /* ✅ LIMPAR RESULTADOS */
['coluna1','coluna2','coluna3'].forEach(id=>{
  document.getElementById(id).innerHTML = '';
});

/* ✅ esconder rodapé */
document.querySelector('.rodape').style.display = 'none';

/* ✅ remover modo sem espaço */
document.querySelector('.conteudo').classList.remove('sem-espaco');


document.getElementById('barra-categorias').innerHTML = '';
document.getElementById('barra-categorias').classList.remove('ativa');

  
                                                             }
  

function comparar(){

  const config = [
    {cliente:'cliente1', pacote:'pacote1', col:'coluna1'},
    {cliente:'cliente2', pacote:'pacote2', col:'coluna2'},
    {cliente:'cliente3', pacote:'pacote3', col:'coluna3'}
  ];

  let temResultado = false;

  config.forEach(cfg=>{

    const cliente = document.getElementById(cfg.cliente).value;
    const pacote = document.getElementById(cfg.pacote).value;

    const coluna = document.getElementById(cfg.col);
    coluna.innerHTML = '';

    if(!cliente || !pacote) return;

    todosCanais.sort((a, b) => Number(a.vc) - Number(b.vc))
    .forEach(c=>{

      const existe = dados.some(d =>
        d.pais===paisSelecionado &&
        d.cliente===cliente &&
        d.pacote===pacote &&
        d.canal===c.canal
      );

      if (existe) {
        temResultado = true;

        coluna.innerHTML += `
          <div class="canal-bloco">
            <div class="canal-numero">${c.vc}</div>
            <div class="canal-nome">${c.canal}</div>
            <div class="canal-tags">
              <div class="canal-badge">${c.categoria}</div>
              <div class="canal-badge">${c.resolucao}</div>
            </div>
          </div>
        `;
      } else {
        coluna.innerHTML += `
          <div class="canal-bloco canal-off">
            <div class="fake-numero"></div>
            <div class="fake-nome"></div>
            <div class="fake-tipo"></div>
          </div>
        `;
      }

    });

 });
                window.addEventListener('scroll', () => {
  const barra = document.getElementById('barra-categorias');

  if (!barra) return;

 
const trigger = document.querySelector('.resultados').offsetTop - 120;

if (window.scrollY > trigger)
 {
    barra.classList.add('oculta');
  } else {
    barra.classList.remove('oculta');
  }
});

  document.querySelector('.rodape').style.display = temResultado ? 'block' : 'none';
  
const conteudo = document.querySelector('.conteudo');

if (temResultado) {
  conteudo.classList.add('sem-espaco');
} else {
  conteudo.classList.remove('sem-espaco');
}

const barra = document.getElementById('barra-categorias');

if (temResultado) {
  const categorias = {};

  // contar categorias do pacote 1 (base)
  const clienteBase = document.getElementById('cliente1').value;
  const pacoteBase = document.getElementById('pacote1').value;

  dados.forEach(d => {
    if (
      d.pais === paisSelecionado &&
      d.cliente === clienteBase &&
      d.pacote === pacoteBase
    ) {
      categorias[d.categoria] = (categorias[d.categoria] || 0) + 1;
    }
  });

  // montar HTML
  barra.innerHTML = Object.entries(categorias)
    .sort((a,b) => a[0].localeCompare(b[0]))
    .map(([nome, qtd]) => `
      <div class="categoria-item">
        <span class="categoria-nome">${nome}</span>
        <span class="categoria-qtd">${qtd}</span>
      </div>
    `)
    .join('');

  barra.classList.add('ativa');

} else {
  barra.classList.remove('ativa');
  barra.innerHTML = '';
}
  
}

  /* ===== NOVO: DETECTAR STICKY CORRETAMENTE ===== */
window.addEventListener('scroll', () => {
  const bloco = document.querySelector('.sticky-bloco');

  if (!bloco) return;

  const trigger = 300; // ajuste fino aqui

  if (window.scrollY >= topoInicial - 20) {
    bloco.classList.add('compacto');
  } else {
    bloco.classList.remove('compacto');
  }
});
  
</script>


  
</body>
</html>
