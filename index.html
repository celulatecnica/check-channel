<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Filtro de Pacotes</title>
</head>
<body>

<h2>Selecione o País:</h2>
<select id="pais"></select>

<h2>Selecione o Cliente:</h2>
<select id="cliente"></select>

<h2>Selecione o Pacote:</h2>
<select id="pacotes"></select>

<h3>Canais:</h3>
<table border="1">
  <thead>
    <tr>
      <th>Canal</th>
      <th>No Pacote</th>
    </tr>
  </thead>
  <tbody id="tabela-canais"></tbody>
</table>

<script>
let dados = [];
let todosCanais = new Set();

// ============================
// CARREGA CSV
// ============================
fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.split('\n');

  linhas.forEach((linha, index) => {

    if (index === 0) return;

    const col = linha.split(';');

    const pais = col[0]?.trim();
    const cliente = col[1]?.trim();
    const pacote = col[2]?.trim();
    const canal = col[3]?.trim();

    if (pais && cliente && pacote && canal) {
      dados.push({ pais, cliente, pacote, canal });
      todosCanais.add(canal);
    }
  });

  carregarPais();
});

// ============================
// PAIS
// ============================
function carregarPais() {
  const select = document.getElementById('pais');

  const paises = [...new Set(dados.map(d => d.pais))].sort();

  select.innerHTML = '<option value="">Selecione</option>';

  paises.forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });
}

// quando muda país
document.getElementById('pais').addEventListener('change', function() {

  const pais = this.value;

  const clientes = [...new Set(
    dados.filter(d => d.pais === pais).map(d => d.cliente)
  )].sort();

  const selectCliente = document.getElementById('cliente');
  selectCliente.innerHTML = '<option value="">Selecione</option>';

  clientes.forEach(c => {
    selectCliente.innerHTML += `<option value="${c}">${c}</option>`;
  });

});

// ============================
// CLIENTE
// ============================
document.getElementById('cliente').addEventListener('change', function() {

  const pais = document.getElementById('pais').value;
  const cliente = this.value;

  const pacotes = [...new Set(
    dados
      .filter(d => d.pais === pais && d.cliente === cliente)
      .map(d => d.pacote)
  )].sort();

  const selectPacote = document.getElementById('pacotes');
  selectPacote.innerHTML = '<option value="">Selecione</option>';

  pacotes.forEach(p => {
    selectPacote.innerHTML += `<option value="${p}">${p}</option>`;
  });

});

// ============================
// PACOTE → TABELA
// ============================
document.getElementById('pacotes').addEventListener('change', function() {

  const pais = document.getElementById('pais').value;
  const cliente = document.getElementById('cliente').value;
  const pacote = this.value;

  const tabela = document.getElementById('tabela-canais');
  tabela.innerHTML = '';

  const canaisDoPacote = dados
    .filter(d => d.pais === pais && d.cliente === cliente && d.pacote === pacote)
    .map(d => d.canal);

  const canaisSet = new Set(canaisDoPacote);

  [...todosCanais].sort().forEach(canal => {

    const tr = document.createElement('tr');

    const tdCanal = document.createElement('td');
    tdCanal.textContent = canal;

    const tdStatus = document.createElement('td');
    const pertence = canaisSet.has(canal);

    tdStatus.textContent = pertence ? 'SI' : 'NO';
    tdStatus.style.color = pertence ? 'green' : 'red';

    tr.appendChild(tdCanal);
    tr.appendChild(tdStatus);

    tabela.appendChild(tr);
  });

});
</script>

</body>
</html>
