<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DIRECTV - Check Channel</title>

<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0F0F0F;
  color: #f5f5f7;
}

/* ===== BASE ===== */
.top-bar {
  position: fixed;
  left: 0;
  width: 100%;
  z-index: 999;

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
}

.top-bar-inner {
  width: 950px;
  max-width: calc(100% - 32px);
  margin: auto;

  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;

  position: relative;
  z-index: 2;
}

/* ===== BARRA 1 (Fina - logo) ===== */

.top-bar-main {
  position: fixed;
  top: 0;
  width: 100%;
  height: 45px;
}

/* ✅ camada de blur separada */
.blur-layer {
  position: absolute;
  inset: 0;

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  background: rgba(15,15,15); /* controla clareamento */
  z-index: 1;
}

/* ===== BARRA 2 (Grossa - título) ===== */
.top-bar-sub {
  top: 45px;
  height: 55px;
  background: rgba(0,0,0,0.2); /* ✅ leve, mas sem “lavar” */
  border-bottom: 1px solid #4D4D4D; /* ✅ linha full width */
}

/* ===== LOGO ===== */
.logo {
  height: 20px;
  display: block;
}

/* ===== TITULO ===== */
.titulo-pequeno {
  font-size: 21px;
  font-weight: 600;
}

/* ===== BANNER ===== */
#banner {
  width: 100%;
  display: block;
}

/* espaço pra scroll */
.fake-content {
  height: 1500px;
  background: #0F0F0F;
}

/* ===== CONTAINER ===== */
.container {
  width: 950px;
  max-width: calc(100% - 32px);
  margin: auto;
  text-align: center;

  padding-left: 16px;
  padding-right: 16px;

}

/* ===== TÍTULO PRINCIPAL ===== */
.titulo-principal {
  font-size: 32px;
  margin-top: 47px;
  margin-bottom: 47px;
  font-weight: 600; /* ✅ semibold */
}
  
.linha {
  width: 100%;
  border-bottom: 1px solid #4D4D4D;
  margin-bottom: 47px; /* ✅ espaço abaixo */
}

/* ===== TITULO DE SEÇÃO ===== */
.titulo-secao {
  width: 950px;
  max-width: calc(100% - 32px);
  margin: auto;

  margin-top: 47px;   /* ✅ distância superior */
  margin-bottom: 23px; /* ✅ distância inferior */

  font-size: 24px;
  font-weight: 600; /* ✅ semibold */

  text-align: center;
}

#bandeiras {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;

  margin-bottom: 47px;
}

.bandeira {
  width: 72px;
  height: 48px;
  margin: 6px;

  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;

  border: 2px solid transparent;
  box-shadow: 0 0 0 4px transparent;

  transition: all 0.25s ease;
}

.bandeira img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.bandeira.active {
  box-shadow:
    0 0 0 3px #0F0F0F,  /* ✅ espaço (cor do fundo) */
    0 0 0 5px #0071e3;  /* ✅ borda branca */
}
  
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;

  margin-top: 24px;
}

/* título pacote */
.titulo-pacote {
  font-size: 24px;       /* ✅ aumenta */
  font-weight: 600;      /* mantém semibold */
  margin-bottom: 23px;   /* ✅ mais respiro abaixo */
  color: #f5f5f7;        /* ✅ mais contraste no dark */
}

/* selects agrupados */
.grupo-selects {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* estilo dos selects */
select {
  height: 60px;
  padding: 0 20px;
  border-radius: 12px;
  border: none;

  font-size: 18px;
  background: #2A2A2A;

  color: #8e8e93; /* ✅ padrão cinza */

  outline: none;
  appearance: none;
  transition: all 0.2s ease;
}

/* quando tiver valor escolhido */
select.ativo {
  color: #ffffff; /* ✅ branco */
}

/* hover leve */
select:hover {
  background: #333333;
}

/* foco (clicado) */
select:focus {
  outline: none;
  box-shadow: none;  /* ✅ remove brilho branco */
  background: #333333;
}

/* placeholder mais claro */
.menu-header {
  display: flex;
  gap: 24px;
}

/* itens */
.menu-item {
  font-size: 14px;
  font-weight: 500;
  color: #b5b5b8;
  cursor: pointer;
  position: relative;
}

/* ativo (Paquetes) */
.menu-item.ativo {
  font-weight: 500;
  color: #ffffff;
}

/* linha ativa */
.menu-item.ativo::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -16px; /* encosta no fundo da barra */

  height: 2px; /* ✅ mais grossa */
  background: #ffffff;
}

/* ===== RESULTADO ===== */
#resultado {
  display: none;
  margin-top: 0;
  background: #ffffff;
  padding: 0;

  width: 100%;

  position: relative;
  left: 50%;
  transform: translateX(-50%); /* ✅ centraliza */
}

/* ✅ FAIXA BRANCA REAL (FULL WIDTH) */
#resultado::before {
  content: "";
  position: absolute;

  left: 50%;
  transform: translateX(-50%);

  width: 100vw;
  height: 100%;

  background: #ffffff;
  z-index: -1;
}

.linha-resultado {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;

  width: 950px;
  max-width: calc(100% - 32px);

  margin-left: 0px;
  margin-right: 0px;

  margin-bottom: 12px;
}

/* bloco canal */
.canal {
  text-align: center;
  padding-bottom: 16px;
  border-bottom: 1px solid #e5e5e5;
  height: 90px; /* pode manter o que já estiver usando */
  max-width: 100%;
  gap: 2px;
  /* ⚠️ PROBLEMA:
     a altura está livre → cada linha cresce diferente */

  /* ✅ SOLUÇÃO (não quebra nada):
     fixa a estrutura interna */
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* VC */
.canal-vc {
  font-size: 16px;
  color: #6e6e73;

  /* ✅ ESSENCIAL:
     garante que TODOS ocupem o mesmo espaço */
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* nome */
.canal-nome {
  font-size: 18px;
  font-weight: 600;
  color: #1d1d1f;
  margin: 4px 0;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

  /* ✅ ESSENCIAL:
     remove variação de altura */
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* tags */
.tags {
  display: flex;
  gap: 6px;
  justify-content: center;

  /* ✅ ESSENCIAL:
     mesmo espaço mesmo sem conteúdo */
  height: 24px;
  align-items: center;
}

.tag {
  font-size: 14px;
  padding: 4px 10px;
  border-radius: 10px;
  background: #f2f2f2;
  color: #1d1d1f;
}

/* placeholder */
.placeholder {
  height: 60px;
  border-radius: 12px;
  background: #e5e5e5;
  margin: auto;
  width: 70%;
}

.body-branco {
  background: #ffffff;
}
  
.linha-resultado:first-child {
  margin-top: 47px; /* ✅ espaçamento EXATO que você pediu */
}

.topo-branco {
  height: 47px;
  width: 100%;
}

.topo-preto {
  height: 47px;
  width: 100%;
  background: #0F0F0F; /* ✅ mesma cor do fundo */
}

/* ===== SKELETON ===== */

.skeleton {
  background: #e5e5e5;
  border-radius: 8px;
  margin: 6px auto;

  /* ✅ IMPORTANTE:
     garante alinhamento vertical consistente com textos */
}

/* alinhado com VC */
.skeleton.vc {
  width: 40px;
  height: 16px;
}

/* alinhado com nome */
.skeleton.nome {
  width: 120px;
  height: 18px;
}

/* alinhado com tags */
.skeleton.tags {
  width: 90px;
  height: 16px;
}

html, body {
  overflow-x: hidden;
}
  
/* ===== HEADER CLARO AO SCROLL ===== */
.top-bar.scrolled {
  background: rgba(255,255,255,0.6); /* ✅ MAIS TRANSPARENTE */
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  border-bottom: 1px solid rgba(0,0,0,0.08);
}

/* título */
.top-bar.scrolled .titulo-pequeno {
  color: #1d1d1f;
}

/* menu */
.top-bar.scrolled .menu-item {
  color: #6e6e73;
}

.top-bar.scrolled .menu-item.ativo {
  color: #000000;
}

.top-bar.scrolled .menu-item.ativo::after {
  background: #000000;
}

.top-bar.scrolled .blur-layer {
  background: rgba(255,255,255,0.4);
}

.top-bar {
  transition: all 0.3s ease;
}

.titulo-pequeno, .menu-item {
  transition: color 0.3s ease;
}

body.sem-resultado {
  overflow-y: hidden;
}

body.sem-resultado {
  height: 100vh;
  overflow-y: auto;
}

</style>
</head>

<body>

<!-- ✅ BARRA 1 -->

<div class="top-bar top-bar-main" id="topbarMain">

  <!-- ✅ camada com blur -->
  <div class="blur-layer"></div>

  <!-- ✅ conteúdo (NÃO sofre blur) -->
  <div class="top-bar-inner">
    <img src="icon_gpt_branco.png" class="logo">
  </div>

</div>

<!-- ✅ BARRA 2 -->
<div class="top-bar top-bar-sub" id="topbarSub">

<div class="top-bar-inner">

  <div class="titulo-pequeno">Check Channel</div>

  <div class="menu-header">
    <div class="menu-item ativo">Paquetes</div>
    <div class="menu-item">Canales</div>
  </div>

</div>

</div>

<!-- ✅ BANNER -->
<img id="banner" src="banner.png">

<div class="container" id="topo">

  <h1 class="titulo-principal">
    Consulte los planes de programación
  </h1>

  <div class="linha"></div>

  <div class="titulo-secao">
    Seleccione el país
  </div>

  <div id="bandeiras"></div>

  <div class="grid">

  <!-- PACOTE 1 -->
  <div class="pacote">
    <div class="titulo-pacote">Paquete principal</div>

    <div class="grupo-selects">
     

<select id="cliente1">
  <option value="" disabled selected>Selecciona el tipo de cliente</option>
</select>

<select id="pacote1">
  <option value="" disabled selected>Selecciona el paquete</option>
</select>

    </div>
  </div>

  <!-- PACOTE 2 -->
  <div class="pacote">
    <div class="titulo-pacote">Comparación 1</div>

    <div class="grupo-selects">

<select id="cliente2">
  <option value="" disabled selected>Selecciona el tipo de cliente</option>
</select>

<select id="pacote2">
  <option value="" disabled selected>Selecciona el paquete</option>
</select>

    </div>
  </div>

  <!-- PACOTE 3 -->
  <div class="pacote">
    <div class="titulo-pacote">Comparación 2</div>

    <div class="grupo-selects">

<select id="cliente3">
  <option value="" disabled selected>Selecciona el tipo de cliente</option>
</select>

<select id="pacote3">
  <option value="" disabled selected>Selecciona el paquete</option>
</select>

    </div>
  </div>
    
<div class="topo-preto"></div>

  </div>

<!-- ✅ RESULTADO -->
<div id="resultado">
  <div class="topo-branco"></div>
  <div class="espacador-topo"></div>
</div>

<div class="fake-content"></div>

<script>

window.addEventListener('scroll', () => {

  const scrollY = window.scrollY;

  const topMain = document.getElementById('topbarMain');
  const topSub = document.getElementById('topbarSub');

  const limite = 70;

  let progresso = scrollY / limite;
  if (progresso > 1) progresso = 1;

  const movimento = -50 * progresso;

  topMain.style.transform = `translateY(${movimento}px)`;
  topSub.style.transform = `translateY(${movimento}px)`;

const resultado = document.getElementById('resultado');
const topbars = document.querySelectorAll('.top-bar');

/* ✅ NÃO usa return → não quebra o resto do scroll */
if (!resultado || resultado.style.display === "none") {

  topbars.forEach(el => el.classList.remove('scrolled'));

} else {

  const trigger = resultado.offsetTop - 100;

  if (window.scrollY >= trigger) {
    topbars.forEach(el => el.classList.add('scrolled'));
  } else {
    topbars.forEach(el => el.classList.remove('scrolled'));
  }

}

// altura máxima permitida (fim do banner)
const limiteScroll = banner.offsetHeight - 100; // ajusta fino aqui se quiser
 
}
                        
travarScrollNoBanner();
  
);

let dados = [];
  
function travarScrollNoBanner() {

  const banner = document.getElementById('banner');
  const resultado = document.getElementById('resultado');

  // se NÃO tem resultado → trava
  if (resultado.style.display === "none") {

    const alturaBanner = banner.offsetHeight;

    const limite = alturaBanner - 100; // ajuste fino se precisar

    if (window.scrollY > limite) {
      window.scrollTo(0, limite);
    }

  }

}
  
/* ✅ CRIA BANDEIRAS */
function carregarBandeiras(){

  const paises = [...new Set(dados.map(d => d.pais))].sort();

  const container = document.getElementById('bandeiras');
  container.innerHTML = "";

  paises.forEach(p => {

    const div = document.createElement('div');
    div.className = 'bandeira';

    const img = document.createElement('img');

    const nomeArquivo = p.toLowerCase().replace(/\s+/g,'');
    img.src = `flags/${nomeArquivo}.png`;

    div.appendChild(img);

    div.dataset.pais = p;
    div.onclick = () => selecionarPais(p, div);

    container.appendChild(div);

  });

}

/* ✅ SELECIONAR PAÍS */
function selecionarPais(pais, elemento){

  document.querySelectorAll('.bandeira')
    .forEach(b => b.classList.remove('active'));

  elemento.classList.add('active');

  /* RESET SELECTS */
  document.querySelectorAll('select').forEach(select => {
    select.selectedIndex = 0;
    select.classList.remove('ativo');
  });

  /* CARREGAR CLIENTES */
  const clientes = [...new Set(
    dados
      .filter(d => d.pais === pais)
      .map(d => d.cliente)
  )];

  ['cliente1','cliente2','cliente3'].forEach(id => {

    const select = document.getElementById(id);

    select.innerHTML = '<option value="" disabled selected>Selecciona el tipo de cliente</option>';

    clientes.forEach(c => {
      select.innerHTML += `<option value="${c}">${c}</option>`;
    });

  });

    const resultado = document.getElementById('resultado');
    resultado.style.display = "none";
    resultado.innerHTML = '<div class="espacador-topo"></div>';

    /* ✅ RESET HEADER */
    const topbars = document.querySelectorAll('.top-bar');
    topbars.forEach(el => el.classList.remove('scrolled'));
    
    document.body.classList.add("sem-resultado");
}
  
function gerarResultado(){

  const resultado = document.getElementById('resultado');

  const selecionados = [1,2,3].map(i => ({
    cliente: document.getElementById(`cliente${i}`).value,
    pacote: document.getElementById(`pacote${i}`).value
  }));

  const paisAtivo = document.querySelector('.bandeira.active');

  // ✅ NÃO TEM PAÍS OU PACOTE → ESCONDE
  if (!paisAtivo || !selecionados[0].pacote) {
    resultado.style.display = "none";
    resultado.innerHTML = '<div class="espacador-topo"></div>';
    return;
  }

  const pais = paisAtivo.dataset.pais;

  /* pegar canais do pacote 1 como base */
  const base = dados
  .filter(d =>
    d.pais === pais &&
    d.cliente === selecionados[0].cliente &&
    d.pacote === selecionados[0].pacote
  )
  .sort((a, b) => (parseInt(a.vc) || 0) - (parseInt(b.vc) || 0));

  resultado.innerHTML = '<div class="topo-branco"></div>';

  base.forEach(ref => {

    const linha = document.createElement('div');
    linha.className = 'linha-resultado';

    [0,1,2].forEach(i => {

      const match = dados.find(d =>
        d.pais === pais &&
        d.cliente === selecionados[i].cliente &&
        d.pacote === selecionados[i].pacote &&
        d.vc === ref.vc
      );

      if(match){
        linha.innerHTML += `
          <div class="canal">
            <div class="canal-vc">${match.vc}</div>
            <div class="canal-nome">${match.canal}</div>
            <div class="tags">
              <div class="tag">${match.categoria}</div>
              <div class="tag">${match.tecnologia}</div>
            </div>
          </div>
        `;
      } else {

        linha.innerHTML += `
          <div class="canal">
            <div class="skeleton vc"></div>
            <div class="skeleton nome"></div>
            <div class="skeleton tags"></div>
          </div>
        `;

      }

    });

    resultado.appendChild(linha);

  });

  // ✅ MOSTRA RESULTADO SÓ QUANDO TEM DADO
  resultado.style.display = "block";

  document.body.classList.remove("sem-resultado");
  
}
  
/* ✅ CARREGAR CSV (UMA VEZ SÓ) */
fetch('pacotes.csv')
  .then(response => response.text())
  .then(texto => {

    const linhas = texto.split('\n');

    linhas.forEach((linha, i) => {

      if (i === 0) return;

      const col = linha.split(';').map(c => c.trim());

      if (col[0]) {
        dados.push({
          pais: col[0],
          cliente: col[1],
          pacote: col[2],
          vc: col[3],
          canal: col[4],
          categoria: col[5],
          tecnologia: col[6]
        });
      }

    });

    carregarBandeiras();

    /* ✅ EVENTO CLIENTE → PACOTE */
    ['cliente1','cliente2','cliente3'].forEach((id,index)=>{

      document.getElementById(id).addEventListener('change', function(){

        const cliente = this.value;

        const ativo = document.querySelector('.bandeira.active');
        if (!ativo) return;

        const pais = ativo.dataset.pais;

        const pacotes = [...new Set(
          dados
            .filter(d => d.pais === pais && d.cliente === cliente)
            .map(d => d.pacote)
        )];

        const selectPacote = document.getElementById(`pacote${index+1}`);

        selectPacote.innerHTML = '<option value="" disabled selected>Selecciona el paquete</option>';

        pacotes.forEach(p=>{
          selectPacote.innerHTML += `<option value="${p}">${p}</option>`;
          document.getElementById(`pacote${index+1}`).addEventListener('change', gerarResultado);
        });

      });
      
gerarResultado();
      
    });

    /* ✅ COR DO SELECT */
    document.querySelectorAll('select').forEach(select => {

      select.addEventListener('change', function(){

        if (this.value !== "") {
          this.classList.add('ativo');
        } else {
          this.classList.remove('ativo');
        }

      });

    });

  });

</script>

</body>
</html>
