<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pacotes</title>
</head>
<body>

<h2>Selecione um pacote:</h2>

<select id="pacotes">
  <option>Carregando...</option>
</select>

<script>
fetch('pacotes.csv')
  .then(response => response.text())
  .then(data => {

    const linhas = data.split('\n');
    const select = document.getElementById('pacotes');

    // remover duplicados
    const pacotesUnicos = new Set();

    linhas.forEach(linha => {
      const colunas = linha.split(';');
      const pacote = colunas[0]?.trim();

      if (pacote && pacote !== "Pacote") {
        pacotesUnicos.add(pacote);
      }
    });

    select.innerHTML = '';

    pacotesUnicos.forEach(pacote => {
      const option = document.createElement('option');
      option.value = pacote;
      option.textContent = pacote;
      select.appendChild(option);
    });

  });
</script>

</body>
</html>
