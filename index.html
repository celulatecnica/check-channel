<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Check Channel</title>

<style>
body { font-family: Arial; }

.menu {
  background: darkblue;
  padding: 10px;
}

.menu button {
  margin-right: 10px;
  padding: 8px 15px;
  background: #00aaff;
  border: none;
  color: white;
  cursor: pointer;
}

.secao { display: none; padding: 20px; }
.ativa { display: block; }

table {
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 5px 10px;
  border: 1px solid black;
}

.si { color: green; }
.no { color: red; }
</style>

</head>
<body>

<!-- MENU -->
<div class="menu">
  <button onclick="mostrar('validar')">Validar Plano</button>
  <button onclick="mostrar('comparar')">Comparar Planos</button>
</div>

<!-- VALIDAR -->
<div id="validar" class="secao ativa">

<h2>Validar Plano</h2>

País:
<select id="pais"></select>

Cliente:
<select id="cliente"></select>

Plano:
<select id="pacotes"></select>

<table>
  <thead>
    <tr>
      <th>Canal</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tabela-validar"></tbody>
</table>

</div>

<!-- COMPARAR -->
<div id="comparar" class="secao">

<h2>Comparar Planos</h2>

País:
<select id="pais2"></select>

Cliente:
<select id="cliente2"></select>

<br><br>

Plano 1:
<select id="pacote1"></select>

Plano 2:
<select id="pacote2"></select>

Plano 3:
<select id="pacote3"></select>

<br><br>
<button onclick="comparar()">Comparar</button>

<table>
  <thead id="thead-comparar"></thead>
  <tbody id="tabela-comparar"></tbody>
</table>

</div>

<script>

let dados = [];
let todosCanais = new Set();

// ================= CARREGAR CSV =================
fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.replace(/\r/g,'').split('\n');

  linhas.forEach((linha, i) => {

    if (i === 0) return;

    const col = linha.split(';').map(c => c.trim());

    const pais = col[0];
    const cliente = col[1];
    const pacote = col[2];
    const canal = col[4]; // coluna correta

    if (pais && cliente && pacote && canal) {
      dados.push({ pais, cliente, pacote, canal });
      todosCanais.add(canal);
    }
  });

  carregarPaises('pais');
  carregarPaises('pais2');

});

// ================= TROCA DE TELA =================
function mostrar(id) {
  document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

// ================= CARREGAR PAIS =================
function carregarPaises(selectId) {

  const select = document.getElementById(selectId);
  const paises = [...new Set(dados.map(d => d.pais))].sort();

  select.innerHTML = '<option value="">Selecione</option>';

  paises.forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });

}

// ================= VALIDAR =================

document.getElementById('pais').onchange = function() {

  const clientes = [...new Set(
    dados.filter(d => d.pais === this.value).map(d => d.cliente)
  )];

  const select = document.getElementById('cliente');
  select.innerHTML = '<option>Selecione</option>';

  clientes.forEach(c => select.innerHTML += `<option>${c}</option>`);
};

document.getElementById('cliente').onchange = function() {

  const pais = document.getElementById('pais').value;

  const pacotes = [...new Set(
    dados.filter(d => d.pais === pais && d.cliente === this.value).map(d => d.pacote)
  )];

  const select = document.getElementById('pacotes');
  select.innerHTML = '';

  pacotes.forEach(p => select.innerHTML += `<option>${p}</option>`);
};

document.getElementById('pacotes').onchange = function() {

  const pais = document.getElementById('pais').value;
  const cliente = document.getElementById('cliente').value;
  const pacote = this.value;

  const canais = dados.filter(d =>
    d.pais === pais && d.cliente === cliente && d.pacote === pacote
  ).map(d => d.canal);

  const set = new Set(canais);

  const tabela = document.getElementById('tabela-validar');
  tabela.innerHTML = '';

  [...todosCanais].sort().forEach(c => {
    tabela.innerHTML += `
      <tr>
        <td>${c}</td>
        <td class="${set.has(c) ? 'si' : 'no'}">
          ${set.has(c) ? 'SI' : 'NO'}
        </td>
      </tr>`;
  });
};

// ================= COMPARAR =================

document.getElementById('cliente2').onchange = function() {

  const pais = document.getElementById('pais2').value;
  const cliente = this.value;

  if (!pais || !cliente) return;

  const pacotes = [...new Set(
    dados
      .filter(d => d.pais === pais && d.cliente === cliente)
      .map(d => d.pacote)
  )].sort();

  console.log("Pacotes encontrados:", pacotes); // DEBUG

  ['pacote1','pacote2','pacote3'].forEach(id => {

    const select = document.getElementById(id);

    select.innerHTML = '<option value="">Selecione</option>';

    pacotes.forEach(p => {
      const option = document.createElement('option');
      option.value = p;
      option.textContent = p;
      select.appendChild(option);
    });

  });

};

// ================= FUNÇÃO COMPARAR =================

function comparar() {

  const pais = document.getElementById('pais2').value;
  const cliente = document.getElementById('cliente2').value;

  const selecionados = [
    document.getElementById('pacote1').value,
    document.getElementById('pacote2').value,
    document.getElementById('pacote3').value
  ].filter(p => p);

  if (selecionados.length === 0) {
    alert("Selecione pelo menos um plano");
    return;
  }

  let thead = '<tr><th>Canal</th>';

  selecionados.forEach(p => {
    thead += `<th>${p}</th>`;
  });

  thead += '</tr>';
  document.getElementById('thead-comparar').innerHTML = thead;

  let html = '';

  [...todosCanais].sort().forEach(canal => {

    html += `<tr><td>${canal}</td>`;

    selecionados.forEach(pacote => {

      const pertence = dados.some(d =>
        d.pais === pais &&
        d.cliente === cliente &&
        d.pacote === pacote &&
        d.canal === canal
      );

      html += `
        <td class="${pertence ? 'si' : 'no'}">
          ${pertence ? 'SI' : 'NO'}
        </td>
      `;
    });

    html += '</tr>';
  });

  document.getElementById('tabela-comparar').innerHTML = html;
}

</script>

</body>
</html>
