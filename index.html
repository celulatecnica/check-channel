<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comparar Planos</title>

<style>

/* HEADER */
.top-bar { height: 44px; background: #fbfbfd; }
.sub-bar { height: 440px; background: #f5f5f7; }

/* BODY */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: white;
  color: #272727;
}

/* CONTAINER */
.container {
  width: 1076px;
  margin: auto;
  text-align: center;
}

/* TÍTULO */
h1 {
  margin-top: 47px;
  margin-bottom: 47px;
  font-size: 52px;
  font-weight: 700;
}

.linha {
  border-bottom: 1px solid #dadade;
}

h2 {
  margin-top: 30px;
}

/* ✅ BLOCO STICKY (EFEITO APPLE) */
.sticky-bloco {
  position: sticky;
  top: 0;

  background: white;
  z-index: 10;

  padding-bottom: 20px;
}

/* BANDEIRAS */
.bandeira {
  display: inline-block;
  width: 72px;
  height: 48px;
  margin: 6px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s ease;
}

.bandeira img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.bandeira:hover {
  border-color: #007aff;
  transform: scale(1.05);
}

.bandeira.active {
  border-color: #007aff;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 17px;
  margin-top: 40px;
}

/* PACOTE */
.pacote {
  text-align: center;
}

.pacote h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

/* SELECT GROUP */
.grupo-selects {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* SELECT */
select {
  display: block;

  width: 100%;
  height: 70px;
  line-height: 70px;

  padding: 0 20px;

  border-radius: 16px;
  border: none;

  background: #f5f5f7;
  font-size: 18px;

  appearance: none;
  -webkit-appearance: none;

  color: #272727;

  background-image: url("data:image/svg+xml;utf8,<svg fill='%23666' height='20' viewBox='0 0 20 20' width='20'><path d='M5 7l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 18px center;
}

select:invalid { color: #b5b5b8; }
select:valid { color: #272727; }

/* BOTÃO */
button {
  margin-top: 30px;
  height: 39px;
  padding: 0 32px;

  background: #0071e3;
  color: white;

  font-size: 16px;
  font-weight: 600;

  border: none;
  border-radius: 16px;

  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover { background: #0a84ff; }
button:active { transform: scale(0.97); }

/* ✅ TABELA ATRÁS */
table {
  width: 100%;
  margin-top: 40px;
  border-collapse: collapse;
  position: relative;
  z-index: 1;
}

th, td {
  padding: 8px;
  border: 1px solid #ddd;
}

.si { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }

</style>

</head>

<body>

<div class="top-bar"></div>
<div class="sub-bar"></div>

<div class="container">

<h1>Compare los planes de programación</h1>

<div class="linha"></div>

<!-- ✅ BLOCO QUE VAI FIXAR -->
<div class="sticky-bloco">

  <h2>Selecciona el país</h2>

  <div id="bandeiras"></div>

  <div class="grid">

    <div class="pacote">
      <h3>Paquete 1</h3>
      <div class="grupo-selects">
        <select id="cliente1" required>
          <option value="" disabled selected>Selecciona el tipo de cliente</option>
        </select>
        <select id="pacote1" required>
          <option value="" disabled selected>Selecciona el paquete</option>
        </select>
      </div>
    </div>

    <div class="pacote">
      <h3>Paquete 2</h3>
      <div class="grupo-selects">
        <select id="cliente2" required>
          <option value="" disabled selected>Selecciona el tipo de cliente</option>
        </select>
        <select id="pacote2" required>
          <option value="" disabled selected>Selecciona el paquete</option>
        </select>
      </div>
    </div>

    <div class="pacote">
      <h3>Paquete 3</h3>
      <div class="grupo-selects">
        <select id="cliente3" required>
          <option value="" disabled selected>Selecciona el tipo de cliente</option>
        </select>
        <select id="pacote3" required>
          <option value="" disabled selected>Selecciona el paquete</option>
        </select>
      </div>
    </div>

  </div>

</div>

<button onclick="comparar()">Comparar</button>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

let dados = [];
let todosCanais = [];
let paisSelecionado = "";

fetch('pacotes.csv')
.then(r => r.text())
.then(texto => {

  const linhas = texto.replace(/\r/g,'').split('\n');

  linhas.forEach((linha,i)=>{
    if(i===0)return;

    const col = linha.split(';').map(c=>c.trim());

    const pais = col[0];
    const cliente = col[1];
    const pacote = col[2];
    const vc = col[3];
    const canal = col[4]?.toUpperCase();
    const resolucao = col[7];

    if(pais){
      dados.push({pais,cliente,pacote,canal,vc,resolucao});
      todosCanais.push({canal,vc,resolucao});
    }
  });

  todosCanais = Object.values(
    Object.fromEntries(todosCanais.map(c=>[c.canal,c]))
  );

  carregarBandeiras();
});

function carregarBandeiras(){

  const container = document.getElementById('bandeiras');

  const paises = [...new Set(dados.map(d=>d.pais))]
    .sort((a,b)=>a.localeCompare(b));

  paises.forEach(p => {

    const div = document.createElement('div');
    div.className = 'bandeira';

    const nomeArquivo = p.toLowerCase()
      .normalize("NFD")
      .replace(/\s+/g,'')
      .replace(/[^a-z]/g,'');

    const img = document.createElement('img');
    img.src = `flags/${nomeArquivo}.png`;

    div.appendChild(img);

    div.onclick = () => selecionarPais(p, div);

    container.appendChild(div);
  });
}

function selecionarPais(pais, elemento){
  paisSelecionado = pais;

  document.querySelectorAll('.bandeira')
    .forEach(b => b.classList.remove('active'));

  elemento.classList.add('active');
}

function comparar(){
  alert("Funcionando 👍");
}

</script>

</body>
</html>
