<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pacotes</title>
</head>
<body>

<h2>Selecione um pacote:</h2>

<select id="pacotes"></select>

<h3>Canais:</h3>

<table border="1">
  <thead>
    <tr>
      <th>Canal</th>
      <th>No Pacote</th>
    </tr>
  </thead>
  <tbody id="tabela-canais">
  </tbody>
</table>

<script>
let dados = [];
let todosCanais = new Set();

// carregar CSV
fetch('pacotes.csv')
  .then(response => response.text())
  .then(data => {

    const linhas = data.split('\n');
    const pacotesUnicos = new Set();

    linhas.forEach((linha, index) => {
      const colunas = linha.split(';');

      if (index === 0) return; // ignora cabeçalho

      const pacote = colunas[0]?.trim();
      const canal = colunas[2]?.trim();

      if (pacote && canal) {
        dados.push({ pacote, canal });
        pacotesUnicos.add(pacote);
        todosCanais.add(canal);
      }
    });

    // preencher select
    const select = document.getElementById('pacotes');

    [...pacotesUnicos].sort().forEach(pacote => {
      const option = document.createElement('option');
      option.value = pacote;
      option.textContent = pacote;
      select.appendChild(option);
    });

    // mostrar primeira vez
    mostrarTabela(select.value);
  });

// evento de mudança
document.getElementById('pacotes').addEventListener('change', function() {
  mostrarTabela(this.value);
});

// função principal
function mostrarTabela(pacoteSelecionado) {

  const tabela = document.getElementById('tabela-canais');
  tabela.innerHTML = '';

  // canais do pacote selecionado
  const canaisDoPacote = dados
    .filter(item => item.pacote === pacoteSelecionado)
    .map(item => item.canal);

  const canaisSet = new Set(canaisDoPacote);

  // percorre TODOS os canais
  [...todosCanais].sort().forEach(canal => {

    const tr = document.createElement('tr');

    const tdCanal = document.createElement('td');
    tdCanal.textContent = canal;

    const tdStatus = document.createElement('td');
    tdStatus.textContent = canaisSet.has(canal) ? 'SI' : 'NO';

    tr.appendChild(tdCanal);
    tr.appendChild(tdStatus);

    tabela.appendChild(tr);
  });
}
</script>

</body>
</html>
